<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JotPsych Ads — Portfolio</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg: #0a0a0a;
            --surface: #111;
            --surface2: #161616;
            --border: #1e1e1e;
            --border2: #2a2a2a;
            --text: #e0e0e0;
            --text-muted: #888;
            --text-dim: #555;
            --green: #22c55e;
            --green-bg: #22c55e18;
            --green-border: #22c55e35;
            --red: #ef4444;
            --red-bg: #ef444418;
            --red-border: #ef444435;
            --blue: #3b82f6;
            --blue-bg: #3b82f618;
            --blue-border: #3b82f635;
            --amber: #f59e0b;
            --amber-bg: #f59e0b15;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .nav {
            display: flex;
            align-items: center;
            padding: 0 32px;
            border-bottom: 1px solid var(--border);
            height: 52px;
            gap: 0;
            flex-shrink: 0;
        }
        .nav-brand {
            font-size: 13px; font-weight: 700; color: #fff;
            letter-spacing: 0.04em; margin-right: 32px; white-space: nowrap;
        }
        .nav-tabs { display: flex; gap: 0; flex: 1; }
        .nav-tab {
            padding: 0 18px; height: 52px; display: flex; align-items: center;
            font-size: 13px; color: var(--text-muted); cursor: pointer;
            border-bottom: 2px solid transparent; transition: color 0.15s, border-color 0.15s;
            white-space: nowrap; user-select: none; text-decoration: none;
        }
        .nav-tab:hover { color: var(--text); }
        .nav-tab.active { color: #fff; border-bottom-color: var(--blue); }

        .content { flex: 1; padding: 24px 32px; overflow-y: auto; }

        .summary-bar {
            display: flex; gap: 24px; margin-bottom: 24px; flex-wrap: wrap;
        }
        .stat-card {
            background: var(--surface); border: 1px solid var(--border);
            border-radius: 8px; padding: 16px 20px; min-width: 160px;
        }
        .stat-label { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 4px; }
        .stat-value { font-size: 22px; font-weight: 600; }
        .stat-value.green { color: var(--green); }

        .controls {
            display: flex; align-items: center; gap: 24px;
            margin-bottom: 20px; flex-wrap: wrap;
        }
        .control-group { display: flex; align-items: center; gap: 8px; }
        .control-group label { font-size: 12px; color: var(--text-muted); }
        .control-group input[type="range"] { width: 160px; accent-color: var(--blue); }
        .control-group input[type="checkbox"] { accent-color: var(--blue); }
        .spend-value { font-size: 12px; color: var(--text); font-weight: 500; min-width: 36px; }

        .chart-container {
            background: var(--surface); border: 1px solid var(--border);
            border-radius: 8px; padding: 20px; position: relative;
            height: 520px;
        }

        .detail-panel {
            display: none; position: fixed; right: 32px; top: 80px;
            width: 340px; background: var(--surface2); border: 1px solid var(--border2);
            border-radius: 10px; padding: 20px; z-index: 100;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
        }
        .detail-panel.visible { display: block; }
        .detail-close {
            position: absolute; top: 10px; right: 14px;
            background: none; border: none; color: var(--text-muted);
            font-size: 18px; cursor: pointer;
        }
        .detail-close:hover { color: var(--text); }
        .detail-name { font-size: 16px; font-weight: 600; margin-bottom: 12px; line-height: 1.3; }
        .detail-row { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid var(--border); font-size: 13px; }
        .detail-row:last-child { border-bottom: none; }
        .detail-label { color: var(--text-muted); }
        .detail-val { font-weight: 500; }
        .detail-img { width: 100%; border-radius: 6px; margin-top: 12px; max-height: 200px; object-fit: contain; background: var(--bg); }

        .format-section {
            margin-top: 24px; background: var(--surface); border: 1px solid var(--border);
            border-radius: 8px; padding: 20px;
        }
        .format-title { font-size: 14px; font-weight: 600; margin-bottom: 12px; }
        .format-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; }
        .format-card { padding: 14px; border-radius: 6px; border: 1px solid var(--border2); }
        .format-card h4 { font-size: 12px; color: var(--text-muted); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.05em; }
        .format-card .val { font-size: 20px; font-weight: 600; }
        .format-delta { font-size: 13px; margin-top: 8px; }
        .format-delta.positive { color: var(--green); }
        .format-delta.negative { color: var(--red); }
        .format-sig { font-size: 11px; color: var(--text-dim); margin-top: 4px; }

        .toast-container { position: fixed; bottom: 24px; right: 24px; z-index: 200; }
        .toast { padding: 10px 18px; border-radius: 6px; background: var(--surface2); border: 1px solid var(--border2); font-size: 13px; margin-top: 8px; }
    </style>
</head>
<body>

<nav class="nav">
    <span class="nav-brand">JotPsych Ads</span>
    <div class="nav-tabs">
        <a class="nav-tab" href="/dashboard/pages/review.html">Review Queue</a>
        <a class="nav-tab active" href="/dashboard/pages/portfolio.html">Portfolio</a>
        <a class="nav-tab" href="/dashboard/pages/review.html#scoreboard">Scoreboard</a>
        <a class="nav-tab" href="/dashboard/pages/review.html#learnings">Learnings</a>
    </div>
</nav>

<div class="content">
    <div class="summary-bar" id="summaryBar">
        <div class="stat-card"><div class="stat-label">Total Ads</div><div class="stat-value" id="statTotal">—</div></div>
        <div class="stat-card"><div class="stat-label">Median CpFN</div><div class="stat-value" id="statMedian">—</div></div>
        <div class="stat-card"><div class="stat-label">Avg CpFN</div><div class="stat-value" id="statAvg">—</div></div>
        <div class="stat-card"><div class="stat-label">Top Performer</div><div class="stat-value green" id="statTop">—</div></div>
        <div class="stat-card"><div class="stat-label">Filtered Out</div><div class="stat-value" id="statFiltered">—</div></div>
    </div>

    <div class="controls">
        <div class="control-group">
            <label>Min Spend: $</label>
            <input type="range" id="minSpend" min="0" max="500" step="10" value="50">
            <span class="spend-value" id="spendLabel">50</span>
        </div>
        <div class="control-group">
            <input type="checkbox" id="showStatic" checked><label for="showStatic">Static</label>
        </div>
        <div class="control-group">
            <input type="checkbox" id="showVideo" checked><label for="showVideo">Video</label>
        </div>
        <div class="control-group">
            <input type="checkbox" id="showOutliers" checked><label for="showOutliers">Outliers</label>
        </div>
    </div>

    <div class="chart-container">
        <canvas id="scatterChart"></canvas>
    </div>

    <div class="format-section" id="formatSection">
        <div class="format-title">Video vs Static Performance</div>
        <div class="format-grid" id="formatGrid">
            <div class="stat-card"><div class="stat-label">Loading...</div></div>
        </div>
    </div>
</div>

<div class="detail-panel" id="detailPanel">
    <button class="detail-close" onclick="closeDetail()">&times;</button>
    <div id="detailContent"></div>
</div>

<div class="toast-container" id="toasts"></div>

<script>
const API = '';
let chart = null;
let allAds = [];

function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

async function loadPortfolio() {
    const minSpend = document.getElementById('minSpend').value;
    try {
        const res = await fetch(`${API}/api/analysis/portfolio-scatter?min_spend=${minSpend}`);
        const data = await res.json();
        allAds = data.ads;
        renderSummary(data);
        renderChart(data);
    } catch (e) {
        console.error('Portfolio load failed:', e);
    }
}

async function loadFormatComparison() {
    try {
        const res = await fetch(`${API}/api/analysis/format-comparison?min_spend=50`);
        if (!res.ok) {
            document.getElementById('formatGrid').innerHTML = '<div class="stat-card"><div class="stat-label">Insufficient data</div></div>';
            return;
        }
        const d = await res.json();
        const deltaClass = d.video_is_better ? 'positive' : 'negative';
        const deltaSign = d.video_is_better ? '' : '+';
        document.getElementById('formatGrid').innerHTML = `
            <div class="format-card">
                <h4>Static Ads</h4>
                <div class="val">$${d.static.avg_cpfn}</div>
                <div class="format-sig">${d.static.count} ads · $${d.static.total_spend.toLocaleString()} spend</div>
                <div class="format-sig">Median: $${d.static.median_cpfn}</div>
            </div>
            <div class="format-card">
                <h4>Video Ads</h4>
                <div class="val">$${d.video.avg_cpfn}</div>
                <div class="format-sig">${d.video.count} ads · $${d.video.total_spend.toLocaleString()} spend</div>
                <div class="format-sig">Median: $${d.video.median_cpfn}</div>
            </div>
            <div class="format-card">
                <h4>Delta</h4>
                <div class="val format-delta ${deltaClass}">${d.video_is_better ? '↓' : '↑'} ${Math.abs(d.delta_pct)}%</div>
                <div class="format-sig">${d.significant ? 'Statistically significant' : 'Not significant'} (p=${d.p_value})</div>
                ${d.regression_coefficient !== null ? `<div class="format-sig">Regression coef: ${d.regression_coefficient} (p=${d.regression_p_value})</div>` : ''}
            </div>
        `;
    } catch (e) {
        document.getElementById('formatGrid').innerHTML = '<div class="stat-card"><div class="stat-label">Format comparison unavailable</div></div>';
    }
}

function renderSummary(data) {
    document.getElementById('statTotal').textContent = data.total_ads;
    document.getElementById('statMedian').textContent = data.median_cpfn != null ? `$${data.median_cpfn}` : '—';
    document.getElementById('statAvg').textContent = data.avg_cpfn != null ? `$${data.avg_cpfn}` : '—';
    document.getElementById('statFiltered').textContent = data.filtered_out;
    if (data.top_5.length > 0) {
        const top = data.top_5[0];
        const name = top.name.length > 25 ? top.name.substring(0, 25) + '…' : top.name;
        document.getElementById('statTop').textContent = `$${top.cpfn}`;
        document.getElementById('statTop').title = name;
    }
}

function renderChart(data) {
    const showStatic = document.getElementById('showStatic').checked;
    const showVideo = document.getElementById('showVideo').checked;
    const showOutliers = document.getElementById('showOutliers').checked;

    const staticAds = data.ads.filter(a => !a.is_video && a.cpfn != null && (!a.is_outlier || showOutliers));
    const videoAds = data.ads.filter(a => a.is_video && a.cpfn != null && (!a.is_outlier || showOutliers));
    const outlierAds = showOutliers ? data.ads.filter(a => a.is_outlier && a.cpfn != null) : [];

    const datasets = [];

    if (showStatic) {
        datasets.push({
            label: 'Static',
            data: staticAds.map(a => ({ x: a.spend, y: a.cpfn, ad: a })),
            backgroundColor: 'rgba(59, 130, 246, 0.7)',
            borderColor: 'rgba(59, 130, 246, 1)',
            borderWidth: 1,
            pointRadius: 6,
            pointHoverRadius: 9,
        });
    }

    if (showVideo) {
        datasets.push({
            label: 'Video',
            data: videoAds.map(a => ({ x: a.spend, y: a.cpfn, ad: a })),
            backgroundColor: 'rgba(34, 197, 94, 0.7)',
            borderColor: 'rgba(34, 197, 94, 1)',
            borderWidth: 1,
            pointRadius: 6,
            pointHoverRadius: 9,
        });
    }

    if (showOutliers && outlierAds.length > 0) {
        datasets.push({
            label: 'Outliers',
            data: outlierAds.map(a => ({ x: a.spend, y: a.cpfn, ad: a })),
            backgroundColor: 'rgba(239, 68, 68, 0.2)',
            borderColor: 'rgba(239, 68, 68, 1)',
            borderWidth: 2,
            pointRadius: 9,
            pointHoverRadius: 12,
            pointStyle: 'crossRot',
        });
    }

    if (chart) chart.destroy();

    const ctx = document.getElementById('scatterChart').getContext('2d');
    chart = new Chart(ctx, {
        type: 'scatter',
        data: { datasets },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
                tooltip: {
                    callbacks: {
                        label: function(context) {
                            const ad = context.raw.ad;
                            const name = ad.name.length > 30 ? ad.name.substring(0, 30) + '…' : ad.name;
                            return `${name} — $${ad.cpfn} CpFN · $${ad.spend} spend`;
                        }
                    }
                },
                legend: {
                    labels: { color: '#888', font: { size: 12 } }
                }
            },
            scales: {
                x: {
                    title: { display: true, text: 'Total Spend ($)', color: '#888' },
                    grid: { color: '#1e1e1e' },
                    ticks: { color: '#888' },
                },
                y: {
                    title: { display: true, text: 'Cost per First Note ($)', color: '#888' },
                    grid: { color: '#1e1e1e' },
                    ticks: { color: '#888' },
                },
            },
            onClick: (event, elements) => {
                if (elements.length > 0) {
                    const el = elements[0];
                    const ad = chart.data.datasets[el.datasetIndex].data[el.index].ad;
                    showDetail(ad);
                }
            }
        },
    });

    // Label top 5
    if (data.top_5.length > 0) {
        const top5Plugin = {
            id: 'top5Labels',
            afterDatasetsDraw(chart) {
                const ctx = chart.ctx;
                ctx.save();
                ctx.font = '11px -apple-system, sans-serif';
                ctx.fillStyle = '#22c55e';
                ctx.textAlign = 'left';
                for (const top of data.top_5) {
                    for (const ds of chart.data.datasets) {
                        for (let i = 0; i < ds.data.length; i++) {
                            if (ds.data[i].ad.id === top.id) {
                                const meta = chart.getDatasetMeta(chart.data.datasets.indexOf(ds));
                                const pt = meta.data[i];
                                if (pt) {
                                    const label = top.name.length > 20 ? top.name.substring(0, 20) + '…' : top.name;
                                    ctx.fillText(`#${top.rank} ${label}`, pt.x + 10, pt.y - 6);
                                }
                            }
                        }
                    }
                }
                ctx.restore();
            }
        };
        chart.config.plugins = [top5Plugin];
        chart.update();
    }
}

function showDetail(ad) {
    const panel = document.getElementById('detailPanel');
    let imgHtml = '';
    if (ad.image_url) {
        const src = ad.source === 'existing' ? ad.image_url : `/data/${ad.image_url}`;
        imgHtml = `<img class="detail-img" src="${esc(src)}" onerror="this.style.display='none'">`;
    }
    document.getElementById('detailContent').innerHTML = `
        <div class="detail-name">${esc(ad.name || 'Untitled')}</div>
        <div class="detail-row"><span class="detail-label">Rank</span><span class="detail-val">${ad.rank || '—'}</span></div>
        <div class="detail-row"><span class="detail-label">CpFN</span><span class="detail-val">${ad.cpfn != null ? '$' + ad.cpfn : '—'}</span></div>
        <div class="detail-row"><span class="detail-label">Spend</span><span class="detail-val">$${ad.spend}</span></div>
        <div class="detail-row"><span class="detail-label">First Notes</span><span class="detail-val">${ad.first_notes}</span></div>
        <div class="detail-row"><span class="detail-label">Format</span><span class="detail-val">${esc(ad.format)}</span></div>
        <div class="detail-row"><span class="detail-label">Source</span><span class="detail-val">${esc(ad.source)}</span></div>
        <div class="detail-row"><span class="detail-label">Outlier</span><span class="detail-val">${ad.is_outlier ? 'Yes' : 'No'}</span></div>
        ${imgHtml}
    `;
    panel.classList.add('visible');
}

function closeDetail() {
    document.getElementById('detailPanel').classList.remove('visible');
}

// Controls
document.getElementById('minSpend').addEventListener('input', function() {
    document.getElementById('spendLabel').textContent = this.value;
});
document.getElementById('minSpend').addEventListener('change', loadPortfolio);
document.getElementById('showStatic').addEventListener('change', () => { if (allAds.length) renderChart({ ads: allAds, top_5: allAds.filter(a => a.cpfn != null).slice(0, 5) }); });
document.getElementById('showVideo').addEventListener('change', () => { if (allAds.length) renderChart({ ads: allAds, top_5: allAds.filter(a => a.cpfn != null).slice(0, 5) }); });
document.getElementById('showOutliers').addEventListener('change', () => { if (allAds.length) renderChart({ ads: allAds, top_5: allAds.filter(a => a.cpfn != null).slice(0, 5) }); });

// Init
loadPortfolio();
loadFormatComparison();
</script>
</body>
</html>
