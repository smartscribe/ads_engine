<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JotPsych Ads — Portfolio Analysis</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4"></script>
    <script src="https://cdn.jsdelivr.net/npm/hammerjs@2.0.8"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom@2.0.1"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg: #0a0a0a;
            --surface: #111;
            --surface2: #161616;
            --surface3: #1a1a1a;
            --border: #1e1e1e;
            --border2: #2a2a2a;
            --text: #e0e0e0;
            --text-muted: #888;
            --text-dim: #555;
            --green: #22c55e;
            --green-bg: #22c55e18;
            --green-border: #22c55e35;
            --red: #ef4444;
            --red-bg: #ef444418;
            --red-border: #ef444435;
            --blue: #3b82f6;
            --blue-bg: #3b82f618;
            --blue-border: #3b82f635;
            --amber: #f59e0b;
            --amber-bg: #f59e0b15;
            --gold: #eab308;
            --gold-bg: #eab30820;
            --gold-border: #eab30850;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .nav {
            display: flex;
            align-items: center;
            padding: 0 32px;
            border-bottom: 1px solid var(--border);
            height: 52px;
            gap: 0;
            flex-shrink: 0;
        }
        .nav-brand {
            font-size: 13px; font-weight: 700; color: #fff;
            letter-spacing: 0.04em; margin-right: 32px; white-space: nowrap;
        }
        .nav-tabs { display: flex; gap: 0; flex: 1; }
        .nav-tab {
            padding: 0 18px; height: 52px; display: flex; align-items: center;
            font-size: 13px; color: var(--text-muted); cursor: pointer;
            border-bottom: 2px solid transparent; transition: color 0.15s, border-color 0.15s;
            white-space: nowrap; user-select: none; text-decoration: none;
        }
        .nav-tab:hover { color: var(--text); }
        .nav-tab.active { color: #fff; border-bottom-color: var(--blue); }

        .content { flex: 1; padding: 24px 32px; overflow-y: auto; }

        .summary-bar {
            display: flex; gap: 16px; margin-bottom: 24px; flex-wrap: wrap;
        }
        .stat-card {
            background: var(--surface); border: 1px solid var(--border);
            border-radius: 8px; padding: 14px 18px; min-width: 140px; flex: 1;
        }
        .stat-card.highlight {
            border-color: var(--gold-border);
            background: var(--gold-bg);
        }
        .stat-label { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 4px; }
        .stat-value { font-size: 22px; font-weight: 600; }
        .stat-value.green { color: var(--green); }
        .stat-sub { font-size: 11px; color: var(--text-dim); margin-top: 2px; }

        .controls {
            display: flex; align-items: center; gap: 20px;
            margin-bottom: 16px; flex-wrap: wrap;
        }
        .control-group { display: flex; align-items: center; gap: 8px; }
        .control-group label { font-size: 12px; color: var(--text-muted); }
        .control-group input[type="range"] { width: 140px; accent-color: var(--blue); }
        .control-group input[type="checkbox"] { accent-color: var(--blue); }
        .spend-value { font-size: 12px; color: var(--text); font-weight: 500; min-width: 36px; }

        .btn {
            padding: 6px 14px; border-radius: 6px; border: 1px solid var(--border2);
            background: var(--surface2); color: var(--text-muted); font-size: 12px;
            cursor: pointer; transition: all 0.15s; user-select: none;
        }
        .btn:hover { color: var(--text); border-color: var(--text-dim); }
        .btn.active { color: var(--blue); border-color: var(--blue); background: var(--blue-bg); }

        .chart-wrapper { position: relative; margin-bottom: 24px; }
        .chart-container {
            background: var(--surface); border: 1px solid var(--border);
            border-radius: 8px; padding: 20px; position: relative;
            height: 560px;
        }
        .chart-hint {
            position: absolute; bottom: 8px; left: 20px;
            font-size: 11px; color: var(--text-dim); pointer-events: none;
        }
        .zoom-controls {
            position: absolute; top: 12px; right: 12px;
            display: flex; gap: 6px; z-index: 10;
        }

        /* Top performers */
        .top-section {
            margin-bottom: 24px;
        }
        .section-header {
            font-size: 14px; font-weight: 600; margin-bottom: 14px;
            display: flex; align-items: center; gap: 8px;
        }
        .section-header .badge {
            font-size: 10px; padding: 2px 8px; border-radius: 10px;
            background: var(--gold-bg); color: var(--gold); border: 1px solid var(--gold-border);
            font-weight: 600;
        }
        .top-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 14px;
        }
        @media (max-width: 1200px) { .top-grid { grid-template-columns: repeat(3, 1fr); } }
        @media (max-width: 800px) { .top-grid { grid-template-columns: repeat(2, 1fr); } }
        .top-card {
            background: var(--surface); border: 1px solid var(--border);
            border-radius: 10px; overflow: hidden; cursor: pointer;
            transition: border-color 0.2s, transform 0.15s;
            position: relative;
        }
        .top-card:hover { border-color: var(--gold-border); transform: translateY(-2px); }
        .top-card .rank-badge {
            position: absolute; top: 10px; left: 10px; z-index: 2;
            width: 28px; height: 28px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 13px; font-weight: 700;
            background: var(--gold); color: #000;
        }
        .top-card .rank-badge.silver { background: #94a3b8; }
        .top-card .rank-badge.bronze { background: #b87333; color: #fff; }
        .top-card-img {
            width: 100%; height: 160px; object-fit: cover;
            background: var(--surface2); display: block;
        }
        .top-card-img-placeholder {
            width: 100%; height: 160px; display: flex;
            align-items: center; justify-content: center;
            background: var(--surface2); color: var(--text-dim); font-size: 12px;
        }
        .top-card-body { padding: 12px 14px; }
        .top-card-name {
            font-size: 13px; font-weight: 500; line-height: 1.3;
            margin-bottom: 8px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .top-card-stats { display: flex; gap: 12px; flex-wrap: wrap; }
        .top-card-stat { font-size: 12px; }
        .top-card-stat .val { font-weight: 600; }
        .top-card-stat .val.green { color: var(--green); }
        .top-card-stat .lbl { color: var(--text-dim); font-size: 10px; }
        .top-card-format {
            display: inline-block; font-size: 10px; padding: 2px 6px; border-radius: 4px;
            margin-top: 6px; text-transform: uppercase; letter-spacing: 0.04em;
        }
        .top-card-format.video { background: var(--green-bg); color: var(--green); border: 1px solid var(--green-border); }
        .top-card-format.static { background: var(--blue-bg); color: var(--blue); border: 1px solid var(--blue-border); }

        /* Format comparison */
        .format-section {
            margin-top: 24px; background: var(--surface); border: 1px solid var(--border);
            border-radius: 8px; padding: 20px;
        }
        .format-title { font-size: 14px; font-weight: 600; margin-bottom: 12px; }
        .format-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; }
        .format-card { padding: 14px; border-radius: 6px; border: 1px solid var(--border2); }
        .format-card h4 { font-size: 12px; color: var(--text-muted); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.05em; }
        .format-card .val { font-size: 20px; font-weight: 600; }
        .format-delta { font-size: 13px; margin-top: 8px; }
        .format-delta.positive { color: var(--green); }
        .format-delta.negative { color: var(--red); }
        .format-sig { font-size: 11px; color: var(--text-dim); margin-top: 4px; }

        /* Detail modal (full overlay) */
        .modal-overlay {
            display: none; position: fixed; inset: 0; z-index: 500;
            background: rgba(0,0,0,0.8); backdrop-filter: blur(4px);
            align-items: center; justify-content: center;
        }
        .modal-overlay.visible { display: flex; }
        .modal {
            background: var(--surface2); border: 1px solid var(--border2);
            border-radius: 12px; max-width: 720px; width: 90vw;
            max-height: 90vh; overflow-y: auto;
            box-shadow: 0 24px 64px rgba(0,0,0,0.6);
        }
        .modal-close {
            position: sticky; top: 0; float: right;
            margin: 12px 14px 0 0;
            background: var(--surface3); border: 1px solid var(--border2);
            color: var(--text-muted); font-size: 16px; cursor: pointer;
            width: 32px; height: 32px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            z-index: 2;
        }
        .modal-close:hover { color: var(--text); border-color: var(--text-dim); }
        .modal-img-wrap {
            padding: 16px 24px 0; text-align: center;
        }
        .modal-img {
            max-width: 100%; max-height: 400px; border-radius: 8px;
            object-fit: contain; background: var(--bg);
        }
        .modal-body { padding: 20px 24px 24px; }
        .modal-name { font-size: 18px; font-weight: 600; margin-bottom: 16px; line-height: 1.3; }
        .modal-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 16px; }
        .modal-stat {
            padding: 12px; border-radius: 8px; border: 1px solid var(--border);
            background: var(--surface);
        }
        .modal-stat .lbl { font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 2px; }
        .modal-stat .val { font-size: 20px; font-weight: 600; }
        .modal-meta { display: flex; gap: 16px; flex-wrap: wrap; }
        .modal-meta-item { font-size: 13px; color: var(--text-muted); }
        .modal-meta-item span { color: var(--text); font-weight: 500; }

        .toast-container { position: fixed; bottom: 24px; right: 24px; z-index: 200; }
        .toast { padding: 10px 18px; border-radius: 6px; background: var(--surface2); border: 1px solid var(--border2); font-size: 13px; margin-top: 8px; }
    </style>
</head>
<body>

<nav class="nav">
    <span class="nav-brand">JotPsych Ads</span>
    <div class="nav-tabs">
        <a class="nav-tab" href="/dashboard/pages/review.html">Review</a>
        <a class="nav-tab active" href="/dashboard/pages/portfolio.html">Portfolio</a>
        <a class="nav-tab" href="/dashboard/pages/hypotheses.html">Hypotheses</a>
        <a class="nav-tab" href="/dashboard/pages/performance.html">Performance</a>
        <a class="nav-tab" href="/dashboard/pages/insights.html">Insights</a>
    </div>
</nav>

<div class="content">
    <div class="summary-bar" id="summaryBar">
        <div class="stat-card"><div class="stat-label">Total Ads</div><div class="stat-value" id="statTotal">—</div><div class="stat-sub" id="statFilteredSub"></div></div>
        <div class="stat-card"><div class="stat-label">Median CpFN</div><div class="stat-value" id="statMedian">—</div></div>
        <div class="stat-card"><div class="stat-label">Avg CpFN</div><div class="stat-value" id="statAvg">—</div></div>
        <div class="stat-card highlight"><div class="stat-label">Best Performer</div><div class="stat-value green" id="statTop">—</div><div class="stat-sub" id="statTopName"></div></div>
        <div class="stat-card"><div class="stat-label">Total Spend</div><div class="stat-value" id="statSpend">—</div></div>
    </div>

    <div class="controls">
        <div class="control-group">
            <label>Min Spend: $</label>
            <input type="range" id="minSpend" min="0" max="500" step="10" value="50">
            <span class="spend-value" id="spendLabel">50</span>
        </div>
        <div class="control-group">
            <input type="checkbox" id="showStatic" checked><label for="showStatic">Static</label>
        </div>
        <div class="control-group">
            <input type="checkbox" id="showVideo" checked><label for="showVideo">Video</label>
        </div>
        <div class="control-group">
            <input type="checkbox" id="showOutliers" checked><label for="showOutliers">Outliers</label>
        </div>
        <div class="control-group">
            <button class="btn" id="toggleLog">Log Scale</button>
        </div>
    </div>

    <div class="chart-wrapper">
        <div class="chart-container">
            <div class="zoom-controls">
                <button class="btn" id="resetZoom">Reset Zoom</button>
            </div>
            <canvas id="scatterChart"></canvas>
        </div>
        <div class="chart-hint">Scroll to zoom · Drag to pan · Click a bubble to inspect · Double-click to reset</div>
    </div>

    <div class="top-section">
        <div class="section-header">Top Performers <span class="badge">By CpFN</span></div>
        <div class="top-grid" id="topGrid"></div>
    </div>

    <div class="format-section" id="formatSection">
        <div class="format-title">Video vs Static Performance</div>
        <div class="format-grid" id="formatGrid">
            <div class="stat-card"><div class="stat-label">Loading...</div></div>
        </div>
    </div>
</div>

<div class="modal-overlay" id="modalOverlay" onclick="if(event.target===this)closeModal()">
    <div class="modal" id="modal">
        <button class="modal-close" onclick="closeModal()">&times;</button>
        <div id="modalContent"></div>
    </div>
</div>

<script>
const API = '';
let chart = null;
let allAds = [];
let cachedData = null;
let useLogScale = false;

function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

async function loadPortfolio() {
    const minSpend = document.getElementById('minSpend').value;
    try {
        const res = await fetch(`${API}/api/analysis/portfolio-scatter?min_spend=${minSpend}`);
        const data = await res.json();
        allAds = data.ads;
        cachedData = data;
        renderSummary(data);
        renderChart(data);
        renderTopPerformers(data.top_5);
    } catch (e) {
        console.error('Portfolio load failed:', e);
    }
}

async function loadFormatComparison() {
    try {
        const res = await fetch(`${API}/api/analysis/format-comparison?min_spend=50`);
        if (!res.ok) {
            document.getElementById('formatGrid').innerHTML = '<div class="stat-card"><div class="stat-label">Insufficient data</div></div>';
            return;
        }
        const d = await res.json();
        const deltaClass = d.video_is_better ? 'positive' : 'negative';
        document.getElementById('formatGrid').innerHTML = `
            <div class="format-card">
                <h4>Static Ads</h4>
                <div class="val">$${d.static.avg_cpfn}</div>
                <div class="format-sig">${d.static.count} ads · $${d.static.total_spend.toLocaleString()} spend</div>
                <div class="format-sig">Median: $${d.static.median_cpfn}</div>
            </div>
            <div class="format-card">
                <h4>Video Ads</h4>
                <div class="val">$${d.video.avg_cpfn}</div>
                <div class="format-sig">${d.video.count} ads · $${d.video.total_spend.toLocaleString()} spend</div>
                <div class="format-sig">Median: $${d.video.median_cpfn}</div>
            </div>
            <div class="format-card">
                <h4>Delta</h4>
                <div class="val format-delta ${deltaClass}">${d.video_is_better ? '↓' : '↑'} ${Math.abs(d.delta_pct)}%</div>
                <div class="format-sig">${d.significant ? 'Statistically significant' : 'Not significant'} (p=${d.p_value})</div>
                ${d.regression_coefficient !== null ? `<div class="format-sig">Regression coef: ${d.regression_coefficient} (p=${d.regression_p_value})</div>` : ''}
            </div>
        `;
    } catch (e) {
        document.getElementById('formatGrid').innerHTML = '<div class="stat-card"><div class="stat-label">Format comparison unavailable</div></div>';
    }
}

function renderSummary(data) {
    document.getElementById('statTotal').textContent = data.total_ads;
    document.getElementById('statFilteredSub').textContent = data.filtered_out > 0 ? `${data.filtered_out} below threshold` : '';
    document.getElementById('statMedian').textContent = data.median_cpfn != null ? `$${data.median_cpfn}` : '—';
    document.getElementById('statAvg').textContent = data.avg_cpfn != null ? `$${data.avg_cpfn}` : '—';

    const totalSpend = data.ads.reduce((s, a) => s + (a.spend || 0), 0);
    document.getElementById('statSpend').textContent = '$' + Math.round(totalSpend).toLocaleString();

    if (data.top_5.length > 0) {
        const top = data.top_5[0];
        document.getElementById('statTop').textContent = `$${top.cpfn}`;
        document.getElementById('statTopName').textContent = top.name.length > 30 ? top.name.substring(0, 30) + '…' : top.name;
    }
}

function bubbleRadius(firstNotes, maxNotes) {
    if (!firstNotes || !maxNotes) return 5;
    const minR = 4, maxR = 22;
    return minR + (maxR - minR) * Math.sqrt(firstNotes / maxNotes);
}

function renderChart(data) {
    const showStatic = document.getElementById('showStatic').checked;
    const showVideo = document.getElementById('showVideo').checked;
    const showOutliers = document.getElementById('showOutliers').checked;

    const maxNotes = Math.max(...data.ads.map(a => a.first_notes || 0), 1);
    const top5Ids = new Set((data.top_5 || []).map(a => a.id));

    const staticAds = data.ads.filter(a => !a.is_video && a.cpfn != null && (!a.is_outlier || showOutliers) && !top5Ids.has(a.id));
    const videoAds = data.ads.filter(a => a.is_video && a.cpfn != null && (!a.is_outlier || showOutliers) && !top5Ids.has(a.id));
    const outlierAds = showOutliers ? data.ads.filter(a => a.is_outlier && a.cpfn != null && !top5Ids.has(a.id)) : [];
    const topAds = data.ads.filter(a => top5Ids.has(a.id) && a.cpfn != null);

    const datasets = [];

    if (showStatic) {
        datasets.push({
            label: 'Static',
            data: staticAds.map(a => ({ x: a.spend, y: a.cpfn, r: bubbleRadius(a.first_notes, maxNotes), ad: a })),
            backgroundColor: 'rgba(59, 130, 246, 0.45)',
            borderColor: 'rgba(59, 130, 246, 0.9)',
            borderWidth: 1.5,
            hoverBorderWidth: 2.5,
        });
    }

    if (showVideo) {
        datasets.push({
            label: 'Video',
            data: videoAds.map(a => ({ x: a.spend, y: a.cpfn, r: bubbleRadius(a.first_notes, maxNotes), ad: a })),
            backgroundColor: 'rgba(34, 197, 94, 0.45)',
            borderColor: 'rgba(34, 197, 94, 0.9)',
            borderWidth: 1.5,
            hoverBorderWidth: 2.5,
        });
    }

    datasets.push({
        label: 'Top 5',
        data: topAds.map(a => ({ x: a.spend, y: a.cpfn, r: Math.max(bubbleRadius(a.first_notes, maxNotes), 10), ad: a })),
        backgroundColor: 'rgba(234, 179, 8, 0.55)',
        borderColor: 'rgba(234, 179, 8, 1)',
        borderWidth: 2.5,
        hoverBorderWidth: 3.5,
    });

    if (showOutliers && outlierAds.length > 0) {
        datasets.push({
            label: 'Outliers',
            data: outlierAds.map(a => ({ x: a.spend, y: a.cpfn, r: bubbleRadius(a.first_notes, maxNotes), ad: a })),
            backgroundColor: 'rgba(239, 68, 68, 0.15)',
            borderColor: 'rgba(239, 68, 68, 0.8)',
            borderWidth: 2,
            borderDash: [4, 3],
            hoverBorderWidth: 3,
        });
    }

    if (chart) chart.destroy();

    const medianLine = data.median_cpfn != null ? {
        id: 'medianLine',
        beforeDraw(chart) {
            const yScale = chart.scales.y;
            const xScale = chart.scales.x;
            const yPx = yScale.getPixelForValue(data.median_cpfn);
            if (yPx < yScale.top || yPx > yScale.bottom) return;
            const ctx = chart.ctx;
            ctx.save();
            ctx.setLineDash([6, 4]);
            ctx.strokeStyle = 'rgba(136, 136, 136, 0.4)';
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.moveTo(xScale.left, yPx);
            ctx.lineTo(xScale.right, yPx);
            ctx.stroke();
            ctx.fillStyle = '#666';
            ctx.font = '10px -apple-system, sans-serif';
            ctx.textAlign = 'right';
            ctx.fillText(`Median $${data.median_cpfn}`, xScale.right - 4, yPx - 5);
            ctx.restore();
        }
    } : { id: 'noop' };

    const top5Labels = {
        id: 'top5Labels',
        afterDatasetsDraw(chart) {
            const ctx = chart.ctx;
            ctx.save();
            ctx.font = 'bold 11px -apple-system, sans-serif';
            ctx.textAlign = 'left';
            for (const ds of chart.data.datasets) {
                if (ds.label !== 'Top 5') continue;
                const meta = chart.getDatasetMeta(chart.data.datasets.indexOf(ds));
                for (let i = 0; i < ds.data.length; i++) {
                    const pt = meta.data[i];
                    if (!pt) continue;
                    const ad = ds.data[i].ad;
                    const label = ad.name.length > 22 ? ad.name.substring(0, 22) + '…' : ad.name;
                    ctx.fillStyle = 'rgba(234, 179, 8, 0.9)';
                    ctx.fillText(`#${ad.rank} ${label}`, pt.x + pt.options.radius + 6, pt.y + 3);
                }
            }
            ctx.restore();
        }
    };

    const ctx = document.getElementById('scatterChart').getContext('2d');
    chart = new Chart(ctx, {
        type: 'bubble',
        data: { datasets },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            interaction: {
                mode: 'nearest',
                intersect: true,
            },
            plugins: {
                tooltip: {
                    backgroundColor: 'rgba(17, 17, 17, 0.95)',
                    borderColor: 'rgba(42, 42, 42, 1)',
                    borderWidth: 1,
                    titleFont: { size: 13, weight: '600' },
                    bodyFont: { size: 12 },
                    padding: 12,
                    callbacks: {
                        title(items) {
                            if (!items.length) return '';
                            const ad = items[0].raw.ad;
                            return ad.name || 'Untitled';
                        },
                        label(context) {
                            const ad = context.raw.ad;
                            return [
                                `CpFN: $${ad.cpfn}`,
                                `Spend: $${ad.spend.toLocaleString()}`,
                                `First Notes: ${ad.first_notes}`,
                                `Format: ${ad.format}`,
                                ad.rank ? `Rank: #${ad.rank}` : '',
                            ].filter(Boolean);
                        }
                    }
                },
                legend: {
                    labels: { color: '#888', font: { size: 12 }, padding: 16, usePointStyle: true, pointStyle: 'circle' }
                },
                zoom: {
                    zoom: {
                        wheel: { enabled: true, speed: 0.08 },
                        pinch: { enabled: true },
                        mode: 'xy',
                        onZoom: () => document.getElementById('resetZoom').classList.add('active'),
                    },
                    pan: {
                        enabled: true,
                        mode: 'xy',
                        onPan: () => document.getElementById('resetZoom').classList.add('active'),
                    },
                },
            },
            scales: {
                x: {
                    type: useLogScale ? 'logarithmic' : 'linear',
                    title: { display: true, text: 'Total Spend ($)', color: '#888', font: { size: 12 } },
                    grid: { color: '#1a1a1a' },
                    ticks: {
                        color: '#888',
                        callback: v => '$' + v.toLocaleString(),
                    },
                    min: useLogScale ? 10 : undefined,
                },
                y: {
                    title: { display: true, text: 'Cost per First Note ($)', color: '#888', font: { size: 12 } },
                    grid: { color: '#1a1a1a' },
                    ticks: {
                        color: '#888',
                        callback: v => '$' + v,
                    },
                },
            },
            onClick: (event, elements) => {
                if (elements.length > 0) {
                    const el = elements[0];
                    const ad = chart.data.datasets[el.datasetIndex].data[el.index].ad;
                    showModal(ad);
                }
            },
            onDblClick: () => {
                if (chart) { chart.resetZoom(); document.getElementById('resetZoom').classList.remove('active'); }
            },
        },
        plugins: [medianLine, top5Labels],
    });
}

function renderTopPerformers(top5) {
    const grid = document.getElementById('topGrid');
    if (!top5 || top5.length === 0) {
        grid.innerHTML = '<div style="color:var(--text-dim);font-size:13px;padding:20px;">No ads above spend threshold</div>';
        return;
    }
    grid.innerHTML = top5.map((ad, i) => {
        const imgSrc = ad.full_image_url || ad.image_url;
        const rankClass = i === 0 ? '' : i === 1 ? 'silver' : 'bronze';
        const fmtClass = ad.is_video ? 'video' : 'static';
        const imgHtml = imgSrc
            ? `<img class="top-card-img" src="${esc(imgSrc)}" onerror="this.outerHTML='<div class=\\'top-card-img-placeholder\\'>No preview</div>'" loading="lazy">`
            : `<div class="top-card-img-placeholder">No preview</div>`;
        return `
            <div class="top-card" onclick='showModal(${JSON.stringify(ad).replace(/'/g, "&#39;")})'>
                <div class="rank-badge ${rankClass}">${i + 1}</div>
                ${imgHtml}
                <div class="top-card-body">
                    <div class="top-card-name" title="${esc(ad.name)}">${esc(ad.name || 'Untitled')}</div>
                    <div class="top-card-stats">
                        <div class="top-card-stat"><div class="val green">$${ad.cpfn}</div><div class="lbl">CpFN</div></div>
                        <div class="top-card-stat"><div class="val">$${ad.spend.toLocaleString()}</div><div class="lbl">Spend</div></div>
                        <div class="top-card-stat"><div class="val">${ad.first_notes}</div><div class="lbl">Notes</div></div>
                    </div>
                    <div class="top-card-format ${fmtClass}">${esc(ad.format)}</div>
                </div>
            </div>
        `;
    }).join('');
}

function showModal(ad) {
    const imgSrc = ad.full_image_url || ad.image_url;
    const detailImgSrc = ad.source === 'existing' ? imgSrc : (imgSrc ? `/data/${imgSrc}` : null);
    const imgHtml = detailImgSrc
        ? `<div class="modal-img-wrap"><img class="modal-img" src="${esc(detailImgSrc)}" onerror="this.parentElement.style.display='none'" loading="lazy"></div>`
        : '';

    document.getElementById('modalContent').innerHTML = `
        ${imgHtml}
        <div class="modal-body">
            <div class="modal-name">${esc(ad.name || 'Untitled')}</div>
            <div class="modal-stats">
                <div class="modal-stat">
                    <div class="lbl">CpFN</div>
                    <div class="val" style="color:var(--green)">${ad.cpfn != null ? '$' + ad.cpfn : '—'}</div>
                </div>
                <div class="modal-stat">
                    <div class="lbl">Total Spend</div>
                    <div class="val">$${ad.spend.toLocaleString()}</div>
                </div>
                <div class="modal-stat">
                    <div class="lbl">First Notes</div>
                    <div class="val">${ad.first_notes}</div>
                </div>
            </div>
            <div class="modal-meta">
                <div class="modal-meta-item">Rank: <span>${ad.rank || '—'}</span></div>
                <div class="modal-meta-item">Format: <span>${esc(ad.format)}</span></div>
                <div class="modal-meta-item">Source: <span>${esc(ad.source)}</span></div>
                <div class="modal-meta-item">Outlier: <span>${ad.is_outlier ? 'Yes' : 'No'}</span></div>
            </div>
        </div>
    `;
    document.getElementById('modalOverlay').classList.add('visible');
}

function closeModal() {
    document.getElementById('modalOverlay').classList.remove('visible');
}

function rerender() {
    if (!cachedData) return;
    renderChart({ ...cachedData, ads: allAds, top_5: cachedData.top_5 });
}

// Controls
document.getElementById('minSpend').addEventListener('input', function() {
    document.getElementById('spendLabel').textContent = this.value;
});
document.getElementById('minSpend').addEventListener('change', loadPortfolio);
document.getElementById('showStatic').addEventListener('change', rerender);
document.getElementById('showVideo').addEventListener('change', rerender);
document.getElementById('showOutliers').addEventListener('change', rerender);
document.getElementById('resetZoom').addEventListener('click', () => {
    if (chart) { chart.resetZoom(); document.getElementById('resetZoom').classList.remove('active'); }
});
document.getElementById('toggleLog').addEventListener('click', function() {
    useLogScale = !useLogScale;
    this.classList.toggle('active', useLogScale);
    rerender();
});
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

// Init
loadPortfolio();
loadFormatComparison();
</script>
</body>
</html>
