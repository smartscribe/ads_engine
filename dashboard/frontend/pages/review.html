<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JotPsych Ads — Review</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg: #0a0a0a;
            --surface: #111;
            --surface2: #161616;
            --border: #1e1e1e;
            --border2: #2a2a2a;
            --text: #e0e0e0;
            --text-muted: #888;
            --text-dim: #555;
            --green: #22c55e;
            --green-bg: #22c55e18;
            --green-border: #22c55e35;
            --red: #ef4444;
            --red-bg: #ef444418;
            --red-border: #ef444435;
            --blue: #3b82f6;
            --blue-bg: #3b82f618;
            --blue-border: #3b82f635;
            --amber: #f59e0b;
            --amber-bg: #f59e0b15;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* ── NAV ─────────────────────────────────────────────────────────── */

        .nav {
            display: flex;
            align-items: center;
            padding: 0 32px;
            border-bottom: 1px solid var(--border);
            height: 52px;
            gap: 0;
            flex-shrink: 0;
        }

        .nav-brand {
            font-size: 13px;
            font-weight: 700;
            color: #fff;
            letter-spacing: 0.04em;
            margin-right: 32px;
            white-space: nowrap;
        }

        .nav-tabs {
            display: flex;
            gap: 0;
            flex: 1;
        }

        .nav-tab {
            padding: 0 18px;
            height: 52px;
            display: flex;
            align-items: center;
            font-size: 13px;
            color: var(--text-muted);
            cursor: pointer;
            border-bottom: 2px solid transparent;
            transition: color 0.15s, border-color 0.15s;
            white-space: nowrap;
            user-select: none;
        }

        .nav-tab:hover { color: var(--text); }
        .nav-tab.active { color: #fff; border-bottom-color: var(--blue); }

        .nav-tab .badge {
            margin-left: 6px;
            padding: 1px 6px;
            border-radius: 10px;
            font-size: 11px;
            background: var(--blue-bg);
            color: var(--blue);
            border: 1px solid var(--blue-border);
        }

        .nav-right {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-left: auto;
        }

        .reviewer-select {
            padding: 5px 10px;
            border-radius: 6px;
            border: 1px solid var(--border2);
            background: var(--surface);
            color: var(--text);
            font-size: 12px;
            cursor: pointer;
        }

        /* ── VIEWS ───────────────────────────────────────────────────────── */

        .view { display: none; flex: 1; flex-direction: column; overflow: hidden; }
        .view.active { display: flex; }

        /* ── REVIEW VIEW ─────────────────────────────────────────────────── */

        .review-toolbar {
            display: flex;
            align-items: center;
            padding: 10px 32px;
            border-bottom: 1px solid var(--border);
            gap: 10px;
            flex-shrink: 0;
        }

        .review-stats {
            display: flex;
            gap: 16px;
            font-size: 12px;
            color: var(--text-muted);
        }

        .review-stats .stat-dot {
            display: inline-block;
            width: 7px; height: 7px;
            border-radius: 50%;
            margin-right: 4px;
        }

        .mode-toggle {
            display: flex;
            border: 1px solid var(--border2);
            border-radius: 6px;
            overflow: hidden;
            margin-left: auto;
        }

        .mode-btn {
            padding: 5px 12px;
            font-size: 12px;
            color: var(--text-muted);
            cursor: pointer;
            background: transparent;
            border: none;
            transition: background 0.15s, color 0.15s;
        }

        .mode-btn:hover { color: var(--text); }
        .mode-btn.active { background: var(--surface2); color: #fff; }

        /* Progress bar */
        .progress-bar-wrap {
            padding: 0 32px 0;
            flex-shrink: 0;
        }

        .progress-bar {
            height: 2px;
            background: var(--border);
            border-radius: 1px;
            overflow: hidden;
        }

        .progress-bar-fill {
            height: 100%;
            background: var(--blue);
            transition: width 0.3s ease;
        }

        /* ── TINDER MODE ─────────────────────────────────────────────────── */

        .tinder-view {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 24px 16px;
            overflow: hidden;
            position: relative;
        }

        .tinder-card-wrap {
            width: 100%;
            max-width: 560px;
            position: relative;
        }

        .tinder-card {
            background: var(--surface);
            border: 1px solid var(--border2);
            border-radius: 16px;
            overflow: hidden;
            transition: transform 0.3s cubic-bezier(0.25, 0.8, 0.25, 1), opacity 0.3s;
        }

        .tinder-card.exiting-approve {
            transform: translateX(120%) rotate(8deg);
            opacity: 0;
        }

        .tinder-card.exiting-reject {
            transform: translateX(-120%) rotate(-8deg);
            opacity: 0;
        }

        .tinder-card .asset-area {
            width: 100%;
            aspect-ratio: 1 / 1;
            background: var(--surface2);
            overflow: hidden;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .tinder-card .asset-area img,
        .tinder-card .asset-area video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .tinder-card .asset-area iframe {
            width: 1080px;
            height: 1080px;
            transform-origin: top left;
            border: none;
            pointer-events: none;
        }

        .tinder-card .asset-area .placeholder-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            color: var(--text-dim);
        }

        .tinder-card .asset-area .placeholder-area svg { opacity: 0.3; }

        .tinder-card .text-preview {
            padding: 20px;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 200px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .tinder-card .text-preview .tp-label {
            font-size: 10px;
            font-weight: 600;
            letter-spacing: 0.08em;
            color: var(--blue);
            text-transform: uppercase;
        }

        .tinder-card .text-preview .tp-headline {
            font-size: 22px;
            font-weight: 700;
            color: #fff;
            line-height: 1.2;
        }

        .tinder-card .text-preview .tp-body {
            font-size: 14px;
            color: rgba(255,255,255,0.7);
            line-height: 1.5;
        }

        .tinder-card .text-preview .tp-cta {
            display: inline-block;
            margin-top: 8px;
            padding: 8px 18px;
            border-radius: 8px;
            background: var(--blue);
            color: #fff;
            font-size: 13px;
            font-weight: 600;
            align-self: flex-start;
        }

        .tinder-card .copy-section {
            padding: 16px 20px;
        }

        .tinder-card .copy-section .headline {
            font-size: 15px;
            font-weight: 600;
            color: #fff;
            margin-bottom: 6px;
        }

        .tinder-card .copy-section .primary-text {
            font-size: 13px;
            color: var(--text-muted);
            line-height: 1.5;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
            margin-bottom: 10px;
        }

        .tinder-card .copy-section .tags {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
        }

        .tinder-card .copy-section .tag {
            font-size: 11px;
            padding: 2px 7px;
            border-radius: 4px;
            background: var(--surface2);
            color: var(--text-dim);
            border: 1px solid var(--border);
        }

        /* Verdict buttons */
        .verdict-row {
            display: flex;
            gap: 12px;
            margin-top: 20px;
            width: 100%;
            max-width: 560px;
        }

        .verdict-btn {
            flex: 1;
            padding: 14px;
            border-radius: 12px;
            border: none;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.15s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .verdict-btn.approve {
            background: var(--green-bg);
            border: 1px solid var(--green-border);
            color: var(--green);
        }

        .verdict-btn.approve:hover { background: #22c55e25; }
        .verdict-btn.approve:active { transform: scale(0.97); }

        .verdict-btn.reject {
            background: var(--red-bg);
            border: 1px solid var(--red-border);
            color: var(--red);
        }

        .verdict-btn.reject:hover { background: #ef444425; }
        .verdict-btn.reject:active { transform: scale(0.97); }

        .kbd {
            display: inline-block;
            padding: 1px 5px;
            border-radius: 4px;
            font-size: 11px;
            background: rgba(255,255,255,0.08);
            color: rgba(255,255,255,0.5);
            font-weight: 400;
            border: 1px solid rgba(255,255,255,0.12);
        }

        /* Chip panel */
        .chip-panel {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: #0f0f0f;
            border-top: 1px solid var(--border2);
            padding: 16px 24px 20px;
            transform: translateY(100%);
            transition: transform 0.28s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 50;
        }

        .chip-panel.open { transform: translateY(0); }

        .chip-panel-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
        }

        .chip-panel-header .label {
            font-size: 12px;
            font-weight: 600;
            color: var(--text-muted);
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }

        .chip-panel-header .skip-link {
            font-size: 12px;
            color: var(--text-dim);
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 5px;
            transition: color 0.15s;
        }

        .chip-panel-header .skip-link:hover { color: var(--text-muted); }

        .chips-wrap {
            display: flex;
            flex-wrap: wrap;
            gap: 7px;
            margin-bottom: 10px;
        }

        .chip {
            padding: 6px 12px;
            border-radius: 20px;
            border: 1px solid var(--border2);
            background: var(--surface);
            color: var(--text-muted);
            font-size: 12px;
            cursor: pointer;
            transition: all 0.12s;
            user-select: none;
        }

        .chip:hover { border-color: var(--border2); color: var(--text); }

        .chip.selected-reject {
            background: var(--red-bg);
            border-color: var(--red-border);
            color: var(--red);
        }

        .chip.selected-approve {
            background: var(--green-bg);
            border-color: var(--green-border);
            color: var(--green);
        }

        .chip-panel-footer {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 8px;
        }

        .note-toggle {
            font-size: 12px;
            color: var(--text-dim);
            cursor: pointer;
            text-decoration: underline;
            text-underline-offset: 2px;
        }

        .note-toggle:hover { color: var(--text-muted); }

        .chip-note-area {
            display: none;
            width: 100%;
            margin-top: 8px;
        }

        .chip-note-area.open { display: block; }

        .chip-note-area textarea {
            width: 100%;
            background: var(--surface);
            border: 1px solid var(--border2);
            border-radius: 8px;
            color: var(--text);
            padding: 10px 12px;
            font-size: 13px;
            resize: vertical;
            min-height: 64px;
            max-height: 120px;
        }

        .chip-note-area textarea::placeholder { color: var(--text-dim); }

        .btn-submit-chips {
            margin-left: auto;
            padding: 7px 16px;
            border-radius: 7px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            background: var(--blue);
            color: #fff;
            transition: opacity 0.15s;
        }

        .btn-submit-chips:hover { opacity: 0.85; }

        /* Tinder empty state */
        .tinder-empty {
            text-align: center;
            color: var(--text-dim);
            padding: 40px;
        }

        .tinder-empty h3 { font-size: 18px; color: var(--text-muted); margin-bottom: 8px; }
        .tinder-empty p { font-size: 13px; }

        /* ── GALLERY MODE ─────────────────────────────────────────────────── */

        .gallery-view {
            flex: 1;
            overflow-y: auto;
            padding: 24px 32px;
        }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 16px;
        }

        .gallery-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
            cursor: pointer;
            transition: border-color 0.15s;
        }

        .gallery-card:hover { border-color: var(--border2); }
        .gallery-card.selected { border-color: var(--blue); box-shadow: 0 0 0 1px var(--blue); }
        .gallery-card.verdict-approved { border-color: var(--green-border); opacity: 0.55; }
        .gallery-card.verdict-rejected { border-color: var(--red-border); opacity: 0.55; }

        .gallery-card .asset {
            width: 100%;
            aspect-ratio: 1 / 1;
            background: var(--surface2);
            overflow: hidden;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .gallery-card .asset img,
        .gallery-card .asset video { width: 100%; height: 100%; object-fit: cover; }

        .gallery-card .asset iframe {
            width: 1080px;
            height: 1080px;
            transform-origin: top left;
            border: none;
            pointer-events: none;
        }

        .gallery-card .asset-badge {
            position: absolute;
            top: 8px;
            right: 8px;
            padding: 2px 7px;
            border-radius: 4px;
            background: rgba(0,0,0,0.65);
            color: var(--text-muted);
            font-size: 10px;
        }

        .gallery-card .card-body { padding: 14px; }

        .gallery-card .card-headline {
            font-size: 14px;
            font-weight: 600;
            color: #fff;
            margin-bottom: 5px;
            line-height: 1.3;
        }

        .gallery-card .card-text {
            font-size: 12px;
            color: var(--text-muted);
            line-height: 1.5;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            margin-bottom: 8px;
        }

        .gallery-card .card-tags { display: flex; flex-wrap: wrap; gap: 4px; }

        .gallery-card .card-tag {
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 4px;
            background: var(--surface2);
            color: var(--text-dim);
        }

        .gallery-card .card-cta {
            display: inline-block;
            margin-top: 8px;
            padding: 4px 10px;
            border-radius: 5px;
            font-size: 11px;
            font-weight: 500;
            background: var(--blue-bg);
            color: var(--blue);
            border: 1px solid var(--blue-border);
        }

        .gallery-toolbar {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
            flex-wrap: wrap;
            align-items: center;
        }

        .gallery-toolbar button {
            padding: 6px 14px;
            border-radius: 6px;
            border: 1px solid var(--border2);
            background: var(--surface);
            color: var(--text-muted);
            font-size: 12px;
            cursor: pointer;
            transition: all 0.12s;
        }

        .gallery-toolbar button:hover { color: var(--text); background: var(--surface2); }

        .gallery-toolbar button.approve {
            border-color: var(--green-border);
            color: var(--green);
        }

        .gallery-toolbar button.approve:hover { background: var(--green-bg); }

        .gallery-toolbar button.reject {
            border-color: var(--red-border);
            color: var(--red);
        }

        .gallery-toolbar button.reject:hover { background: var(--red-bg); }

        /* Gallery modal for chip feedback */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.75);
            z-index: 100;
            align-items: center;
            justify-content: center;
        }

        .modal-overlay.active { display: flex; }

        .modal-box {
            background: var(--surface);
            border: 1px solid var(--border2);
            border-radius: 14px;
            padding: 24px;
            width: 500px;
            max-width: 94vw;
        }

        .modal-box h3 { color: #fff; font-size: 16px; margin-bottom: 4px; }
        .modal-box .modal-sub { color: var(--text-muted); font-size: 13px; margin-bottom: 16px; }

        .modal-box .chips-section { margin-bottom: 14px; }
        .modal-box .chips-section-label {
            font-size: 11px;
            font-weight: 600;
            color: var(--text-dim);
            letter-spacing: 0.06em;
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        .modal-box textarea {
            width: 100%;
            height: 80px;
            background: var(--bg);
            border: 1px solid var(--border2);
            border-radius: 8px;
            color: var(--text);
            padding: 10px;
            font-size: 13px;
            resize: vertical;
            margin-top: 10px;
        }

        .modal-box textarea::placeholder { color: var(--text-dim); }

        .modal-actions {
            display: flex;
            gap: 8px;
            justify-content: flex-end;
            margin-top: 16px;
        }

        .btn-modal-cancel {
            padding: 7px 14px;
            border-radius: 7px;
            border: 1px solid var(--border2);
            background: transparent;
            color: var(--text-muted);
            font-size: 13px;
            cursor: pointer;
        }

        .btn-modal-submit {
            padding: 7px 16px;
            border-radius: 7px;
            border: none;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
        }

        .btn-modal-submit.approve {
            background: var(--green-bg);
            border: 1px solid var(--green-border);
            color: var(--green);
        }

        .btn-modal-submit.reject {
            background: var(--red-bg);
            border: 1px solid var(--red-border);
            color: var(--red);
        }

        /* ── SCOREBOARD VIEW ──────────────────────────────────────────────── */

        .scoreboard-view {
            flex: 1;
            overflow-y: auto;
            padding: 28px 32px;
        }

        .scoreboard-view h2 {
            font-size: 18px;
            font-weight: 600;
            color: #fff;
            margin-bottom: 4px;
        }

        .scoreboard-meta {
            font-size: 13px;
            color: var(--text-muted);
            margin-bottom: 20px;
        }

        .scoreboard-table {
            width: 100%;
            border-collapse: collapse;
        }

        .scoreboard-table th {
            text-align: left;
            padding: 8px 12px;
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            color: var(--text-dim);
            border-bottom: 1px solid var(--border);
            cursor: pointer;
            user-select: none;
        }

        .scoreboard-table th:hover { color: var(--text-muted); }

        .scoreboard-table td {
            padding: 11px 12px;
            font-size: 13px;
            border-bottom: 1px solid var(--border);
            color: var(--text-muted);
        }

        .scoreboard-table tr:hover td { background: var(--surface2); }

        .scoreboard-table .rank-cell {
            font-size: 11px;
            font-weight: 700;
            color: var(--text-dim);
            width: 40px;
        }

        .scoreboard-table .headline-cell {
            color: var(--text);
            max-width: 280px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .scoreboard-table .cpfn-cell {
            font-weight: 700;
            font-variant-numeric: tabular-nums;
        }

        .cpfn-winner { color: var(--green); }
        .cpfn-mid { color: var(--amber); }
        .cpfn-loser { color: var(--red); }

        .trend-up::before { content: "↑ "; color: var(--green); }
        .trend-down::before { content: "↓ "; color: var(--red); }
        .trend-stable::before { content: "→ "; color: var(--text-dim); }

        .verdict-badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 600;
        }

        .verdict-badge.scale { background: var(--green-bg); color: var(--green); border: 1px solid var(--green-border); }
        .verdict-badge.kill { background: var(--red-bg); color: var(--red); border: 1px solid var(--red-border); }
        .verdict-badge.wait { background: var(--blue-bg); color: var(--blue); border: 1px solid var(--blue-border); }

        .scoreboard-empty {
            text-align: center;
            padding: 60px 0;
            color: var(--text-dim);
        }

        .scoreboard-empty h3 { font-size: 16px; color: var(--text-muted); margin-bottom: 6px; }

        /* ── LEARNINGS VIEW ───────────────────────────────────────────────── */

        .learnings-view {
            flex: 1;
            overflow-y: auto;
            padding: 28px 32px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
            align-content: start;
        }

        @media (max-width: 900px) {
            .learnings-view { grid-template-columns: 1fr; }
        }

        .learnings-section {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
        }

        .learnings-section.full-width {
            grid-column: 1 / -1;
        }

        .learnings-section h3 {
            font-size: 14px;
            font-weight: 600;
            color: #fff;
            margin-bottom: 14px;
        }

        .playbook-rule {
            padding: 12px;
            border-radius: 8px;
            border: 1px solid var(--border);
            margin-bottom: 10px;
            background: var(--surface2);
        }

        .playbook-rule:last-child { margin-bottom: 0; }

        .playbook-rule .rule-text {
            font-size: 13px;
            color: var(--text);
            line-height: 1.5;
            margin-bottom: 6px;
        }

        .playbook-rule .rule-meta {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .confidence-badge {
            font-size: 10px;
            font-weight: 600;
            padding: 2px 7px;
            border-radius: 4px;
        }

        .confidence-badge.high { background: var(--green-bg); color: var(--green); border: 1px solid var(--green-border); }
        .confidence-badge.moderate { background: var(--amber-bg); color: var(--amber); border: 1px solid #f59e0b30; }

        .direction-badge {
            font-size: 10px;
            padding: 2px 7px;
            border-radius: 4px;
        }

        .direction-badge.use_more { background: var(--green-bg); color: var(--green); border: 1px solid var(--green-border); }
        .direction-badge.avoid { background: var(--red-bg); color: var(--red); border: 1px solid var(--red-border); }

        .chip-impact-row {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 0;
            border-bottom: 1px solid var(--border);
        }

        .chip-impact-row:last-child { border-bottom: none; }

        .chip-impact-label {
            font-size: 12px;
            color: var(--text);
            flex: 1;
        }

        .chip-impact-count {
            font-size: 13px;
            font-weight: 700;
            font-variant-numeric: tabular-nums;
            color: var(--text-muted);
        }

        .chip-bar {
            width: 80px;
            height: 4px;
            background: var(--border);
            border-radius: 2px;
            overflow: hidden;
        }

        .chip-bar-fill {
            height: 100%;
            border-radius: 2px;
            background: var(--red);
        }

        .chip-bar-fill.approval { background: var(--green); }

        .memory-stat {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 7px 0;
            border-bottom: 1px solid var(--border);
            font-size: 13px;
        }

        .memory-stat:last-child { border-bottom: none; }
        .memory-stat .label { color: var(--text-muted); }
        .memory-stat .value { color: var(--text); font-weight: 600; }

        .reviewer-profile {
            padding: 12px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: var(--surface2);
        }

        .reviewer-profile .profile-stat {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            margin-bottom: 5px;
        }

        .reviewer-profile .profile-stat .pl { color: var(--text-muted); }
        .reviewer-profile .profile-stat .pv { color: var(--text); font-variant-numeric: tabular-nums; }

        .learnings-empty {
            color: var(--text-dim);
            font-size: 13px;
            padding: 20px 0;
            text-align: center;
        }

        /* ── TOAST ───────────────────────────────────────────────────────── */

        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            padding: 10px 18px;
            border-radius: 8px;
            font-size: 13px;
            z-index: 200;
            transition: opacity 0.3s;
            pointer-events: none;
        }

        .toast-success { background: var(--green-bg); border: 1px solid var(--green-border); color: var(--green); }
        .toast-error { background: var(--red-bg); border: 1px solid var(--red-border); color: var(--red); }
        .toast-info { background: var(--blue-bg); border: 1px solid var(--blue-border); color: var(--blue); }

        /* ── UTIL ────────────────────────────────────────────────────────── */

        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 60px;
            color: var(--text-dim);
            font-size: 13px;
        }

        code { font-family: monospace; background: var(--surface2); padding: 1px 5px; border-radius: 3px; font-size: 12px; }
    </style>
</head>
<body>

<!-- NAV -->
<nav class="nav">
    <span class="nav-brand">JotPsych Ads</span>
    <div class="nav-tabs">
        <div class="nav-tab active" data-view="review" onclick="switchView('review')">
            Review Queue <span class="badge" id="pendingBadge">0</span>
        </div>
        <div class="nav-tab" data-view="scoreboard" onclick="switchView('scoreboard')">
            Scoreboard
        </div>
        <div class="nav-tab" data-view="learnings" onclick="switchView('learnings')">
            Learnings
        </div>
    </div>
    <div class="nav-right">
        <span style="font-size:12px;color:var(--text-muted);">Reviewing as:</span>
        <select class="reviewer-select" id="reviewerSelect" onchange="onReviewerChange()">
            <option value="nate">Nate</option>
            <option value="jackson">Jackson</option>
            <option value="aryan">Aryan</option>
            <option value="alex">Alex</option>
            <option value="daniel">Daniel</option>
        </select>
    </div>
</nav>

<!-- ── REVIEW VIEW ──────────────────────────────────────────────────────── -->
<div class="view active" id="view-review">

    <div class="review-toolbar">
        <div class="review-stats">
            <span><span class="stat-dot" style="background:#3b82f6;"></span><span id="statPending">0</span> pending</span>
            <span><span class="stat-dot" style="background:#22c55e;"></span><span id="statApproved">0</span> approved</span>
            <span><span class="stat-dot" style="background:#ef4444;"></span><span id="statRejected">0</span> rejected</span>
        </div>
        <div class="mode-toggle" style="margin-left:auto;">
            <button class="mode-btn active" id="modeTinder" onclick="setMode('tinder')">Focus</button>
            <button class="mode-btn" id="modeGallery" onclick="setMode('gallery')">Gallery</button>
        </div>
    </div>

    <div class="progress-bar-wrap" style="padding:6px 32px 0;">
        <div class="progress-bar">
            <div class="progress-bar-fill" id="progressFill" style="width:0%"></div>
        </div>
    </div>

    <!-- Tinder (focus) mode -->
    <div class="tinder-view" id="tinderView">
        <div id="tinderContent"></div>
    </div>

    <!-- Gallery mode -->
    <div class="gallery-view" id="galleryView" style="display:none;">
        <div class="gallery-toolbar" id="galleryToolbar">
            <button class="approve" onclick="showGalleryModal('approve')">Approve Selected</button>
            <button class="reject" onclick="showGalleryModal('reject')">Reject Selected</button>
            <div style="width:1px;height:20px;background:var(--border2);margin:0 2px;"></div>
            <button onclick="selectAll()">Select All</button>
            <button onclick="clearSelection()">Clear</button>
        </div>
        <div class="gallery-grid" id="galleryGrid"></div>
    </div>
</div>

<!-- ── SCOREBOARD VIEW ─────────────────────────────────────────────────── -->
<div class="view" id="view-scoreboard">
    <div class="scoreboard-view" id="scoreboardContent">
        <div class="loading">Loading scoreboard...</div>
    </div>
</div>

<!-- ── LEARNINGS VIEW ──────────────────────────────────────────────────── -->
<div class="view" id="view-learnings">
    <div class="learnings-view" id="learningsContent">
        <div class="loading" style="grid-column:1/-1;">Loading learnings...</div>
    </div>
</div>

<!-- Gallery verdict modal -->
<div class="modal-overlay" id="galleryModal">
    <div class="modal-box">
        <h3 id="modalTitle">Approve Ads</h3>
        <p class="modal-sub" id="modalSub">Optional: tap what you liked so the system learns.</p>
        <div class="chips-section" id="modalChipsWrap"></div>
        <textarea id="modalNote" placeholder="Optional note..."></textarea>
        <div class="modal-actions">
            <button class="btn-modal-cancel" onclick="closeGalleryModal()">Cancel</button>
            <button class="btn-modal-submit" id="modalSubmitBtn" onclick="submitGalleryVerdict()">Approve</button>
        </div>
    </div>
</div>

<!-- Chip panel (Tinder mode) -->
<div class="chip-panel" id="chipPanel">
    <div class="chip-panel-header">
        <span class="label" id="chipPanelLabel">What's wrong with it?</span>
        <span class="skip-link" onclick="advanceTinder()">Skip → next card</span>
    </div>
    <div class="chips-wrap" id="chipPanelChips"></div>
    <div class="chip-note-area" id="chipNoteArea">
        <textarea id="chipNoteText" placeholder="Add a note (optional)..."></textarea>
    </div>
    <div class="chip-panel-footer">
        <span class="note-toggle" onclick="toggleChipNote()">+ add note</span>
        <button class="btn-submit-chips" onclick="submitChipFeedback()">Done →</button>
    </div>
</div>

<div id="toast" class="toast" style="display:none;"></div>

<script>
// ============================================================
//  STATE
// ============================================================
const API = '';
let variants = [];           // pending review queue
let currentIndex = 0;        // tinder cursor
let pendingVerdict = null;    // { variant_id, verdict, cardShownAt }
let pendingReviewChips = [];  // chips selected in chip panel
let selectedIds = new Set();  // gallery selection
let currentMode = 'tinder';
let chips = { rejection: [], approval: [] };
let galleryVerdictType = null; // 'approve' | 'reject' for gallery modal

// ============================================================
//  INIT
// ============================================================
document.addEventListener('DOMContentLoaded', async () => {
    await Promise.all([loadChips(), loadQueue()]);
    loadReviewCounts();
    bindKeyboard();

    // Route on hash
    const hash = location.hash.replace('#', '');
    if (hash === 'scoreboard') switchView('scoreboard');
    else if (hash === 'learnings') switchView('learnings');
});

// ============================================================
//  NAVIGATION
// ============================================================
function switchView(name) {
    document.querySelectorAll('.nav-tab').forEach(t => t.classList.toggle('active', t.dataset.view === name));
    document.querySelectorAll('.view').forEach(v => v.classList.toggle('active', v.id === `view-${name}`));
    location.hash = name;

    if (name === 'scoreboard') loadScoreboard();
    else if (name === 'learnings') loadLearnings();
}

function onReviewerChange() {
    // Refresh learnings view if it's open
    const active = document.querySelector('.view.active');
    if (active && active.id === 'view-learnings') loadLearnings();
}

// ============================================================
//  REVIEW MODE
// ============================================================
function setMode(mode) {
    currentMode = mode;
    document.getElementById('modeTinder').classList.toggle('active', mode === 'tinder');
    document.getElementById('modeGallery').classList.toggle('active', mode === 'gallery');
    document.getElementById('tinderView').style.display = mode === 'tinder' ? 'flex' : 'none';
    document.getElementById('galleryView').style.display = mode === 'gallery' ? 'block' : 'none';
    if (mode === 'gallery') renderGallery();
    else renderTinder();
}

// ============================================================
//  DATA LOADING
// ============================================================
async function loadChips() {
    try {
        const res = await fetch(`${API}/api/feedback-chips`);
        chips = await res.json();
    } catch (e) { /* fallback — chips will be empty */ }
}

async function loadQueue() {
    try {
        const res = await fetch(`${API}/api/review`);
        const data = await res.json();
        variants = data.variants || [];
        currentIndex = 0;
        document.getElementById('pendingBadge').textContent = variants.length;
        document.getElementById('statPending').textContent = variants.length;
        updateProgress();
        if (currentMode === 'tinder') renderTinder();
        else renderGallery();
    } catch (e) {
        document.getElementById('tinderContent').innerHTML = `<div class="tinder-empty"><h3>Can't connect</h3><p>Run: <code>uvicorn dashboard.api.app:app --reload</code></p></div>`;
    }
}

async function loadReviewCounts() {
    try {
        const res = await fetch(`${API}/api/review/history`);
        const data = await res.json();
        document.getElementById('statApproved').textContent = data.approved_count;
        document.getElementById('statRejected').textContent = data.rejected_count;
    } catch (e) {}
}

function updateProgress() {
    const total = variants.length + currentIndex;
    const pct = total > 0 ? (currentIndex / total) * 100 : 0;
    document.getElementById('progressFill').style.width = pct + '%';
}

// ============================================================
//  TINDER (FOCUS) MODE
// ============================================================
function renderTinder() {
    const wrap = document.getElementById('tinderContent');

    if (!variants.length) {
        wrap.innerHTML = `<div class="tinder-empty"><h3>All caught up</h3><p>No variants pending review.</p></div>`;
        return;
    }

    const v = variants[currentIndex];
    if (!v) {
        wrap.innerHTML = `<div class="tinder-empty"><h3>Queue complete</h3><p>Reviewed all ${currentIndex} ads this session.</p></div>`;
        return;
    }

    const assetHtml = buildAssetHtml(v, true);

    wrap.innerHTML = `
        <div class="tinder-card-wrap">
            <div class="tinder-card" id="tinderCard">
                ${assetHtml}
                <div class="copy-section">
                    <div class="headline">${esc(v.headline)}</div>
                    <div class="primary-text">${esc(v.primary_text)}</div>
                    <div class="tags">
                        ${[v.taxonomy?.message_type, v.taxonomy?.hook_type, v.taxonomy?.tone, v.taxonomy?.format].filter(Boolean).map(t => `<span class="tag">${esc(t)}</span>`).join('')}
                    </div>
                </div>
            </div>
        </div>
        <div class="verdict-row">
            <button class="verdict-btn reject" onclick="tinderVerdict('rejected')">
                <span>✕ Reject</span><span class="kbd">←</span>
            </button>
            <button class="verdict-btn approve" onclick="tinderVerdict('approved')">
                <span>✓ Approve</span><span class="kbd">→</span>
            </button>
        </div>
    `;

    // Scale iframe to fit the card
    scaleIframes();

    // Record when card was shown for duration tracking
    if (v) v._shownAt = Date.now();
}

function buildAssetHtml(v, isTinder) {
    const status = v.asset_status || 'pending';
    const path = v.asset_path || '';
    const isImg = status === 'rendered' && /\.(png|jpg|jpeg|webp)$/i.test(path);
    const isVid = status === 'rendered' && /\.(mp4|webm)$/i.test(path);

    if (isImg) {
        return `<div class="${isTinder ? 'asset-area' : 'asset'}">
            <img src="/${path}" alt="${esc(v.headline)}" onerror="this.parentElement.innerHTML=fallbackPlaceholder()">
            <span class="asset-badge">image</span>
        </div>`;
    }
    if (isVid) {
        return `<div class="${isTinder ? 'asset-area' : 'asset'}">
            <video src="/${path}" muted playsinline onerror="this.parentElement.innerHTML=fallbackPlaceholder()"></video>
            <span class="asset-badge">video</span>
        </div>`;
    }
    if (status === 'template_available') {
        return `<div class="${isTinder ? 'asset-area' : 'asset'}">
            <iframe src="/api/template-preview/${v.id}" loading="lazy" scrolling="no"
                onload="scaleIframes()"></iframe>
            <span class="asset-badge">template</span>
        </div>`;
    }
    // Text-only fallback
    return `<div class="${isTinder ? 'asset-area' : 'asset'}" style="padding:0;">
        <div class="text-preview">
            <span class="tp-label">${esc(v.taxonomy?.format || 'Ad')}</span>
            <div class="tp-headline">${esc(v.headline)}</div>
            <div class="tp-body">${esc(v.primary_text)}</div>
            <span class="tp-cta">${esc(v.cta_button || 'Learn More')}</span>
        </div>
    </div>`;
}

function fallbackPlaceholder() {
    return `<div style="display:flex;align-items:center;justify-content:center;flex-direction:column;gap:8px;height:100%;background:var(--surface2);color:var(--text-dim);">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="m21 15-5-5L5 21"/></svg>
        <span style="font-size:12px;">Asset pending</span>
    </div>`;
}

function scaleIframes() {
    document.querySelectorAll('.asset-area iframe, .asset iframe').forEach(iframe => {
        const parent = iframe.parentElement;
        if (!parent) return;
        const w = parent.clientWidth;
        const scale = w / 1080;
        iframe.style.transform = `scale(${scale})`;
        parent.style.height = (1080 * scale) + 'px';
    });
}

window.addEventListener('resize', scaleIframes);

function tinderVerdict(verdict) {
    const v = variants[currentIndex];
    if (!v) return;

    const duration = v._shownAt ? Date.now() - v._shownAt : 0;
    pendingVerdict = { variant_id: v.id, verdict, duration_ms: duration };
    pendingReviewChips = [];

    // Animate card out
    const card = document.getElementById('tinderCard');
    if (card) {
        card.classList.add(verdict === 'approved' ? 'exiting-approve' : 'exiting-reject');
    }

    // Submit verdict immediately (non-blocking)
    submitVerdict(v.id, verdict, duration, []);

    // Show chip panel
    openChipPanel(verdict);
}

async function submitVerdict(variantId, verdict, durationMs, selectedChips, note) {
    try {
        await fetch(`${API}/api/review/submit`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                variant_id: variantId,
                reviewer: getReviewer(),
                verdict,
                chips: selectedChips || [],
                freeform_note: note || null,
                review_duration_ms: durationMs || 0,
            }),
        });
    } catch (e) { /* best-effort */ }
}

function openChipPanel(verdict) {
    const panel = document.getElementById('chipPanel');
    const label = document.getElementById('chipPanelLabel');
    const chipsWrap = document.getElementById('chipPanelChips');

    label.textContent = verdict === 'rejected' ? 'What\'s wrong with it? (optional)' : 'What did you like? (optional)';

    const chipList = verdict === 'rejected' ? chips.rejection : chips.approval;
    pendingReviewChips = [];
    const chipClass = verdict === 'rejected' ? 'selected-reject' : 'selected-approve';

    chipsWrap.innerHTML = (chipList || []).map(c =>
        `<div class="chip" data-id="${c.id}" data-class="${chipClass}" onclick="toggleChip(this, '${c.id}', '${chipClass}')">${esc(c.label)}</div>`
    ).join('');

    // Reset note area
    document.getElementById('chipNoteText').value = '';
    document.getElementById('chipNoteArea').classList.remove('open');

    panel.classList.add('open');
}

function toggleChip(el, chipId, cls) {
    if (el.classList.contains(cls)) {
        el.classList.remove(cls);
        pendingReviewChips = pendingReviewChips.filter(id => id !== chipId);
    } else {
        el.classList.add(cls);
        pendingReviewChips.push(chipId);
    }
}

function toggleChipNote() {
    document.getElementById('chipNoteArea').classList.toggle('open');
}

async function submitChipFeedback() {
    if (!pendingVerdict) { advanceTinder(); return; }

    const note = document.getElementById('chipNoteText').value.trim() || null;

    // Patch the already-submitted review with chips + note if any
    if (pendingReviewChips.length || note) {
        await submitVerdict(
            pendingVerdict.variant_id,
            pendingVerdict.verdict,
            pendingVerdict.duration_ms,
            pendingReviewChips,
            note,
        );
    }

    advanceTinder();
}

function advanceTinder() {
    document.getElementById('chipPanel').classList.remove('open');
    pendingVerdict = null;
    pendingReviewChips = [];
    currentIndex++;
    updateProgress();

    // Remove processed variant from list
    variants.splice(0, currentIndex);
    currentIndex = 0;

    loadReviewCounts();
    document.getElementById('pendingBadge').textContent = variants.length;
    document.getElementById('statPending').textContent = variants.length;

    renderTinder();
}

function bindKeyboard() {
    document.addEventListener('keydown', e => {
        if (currentMode !== 'tinder') return;
        if (['INPUT', 'TEXTAREA', 'SELECT'].includes(e.target.tagName)) return;

        const chipPanelOpen = document.getElementById('chipPanel').classList.contains('open');

        if (!chipPanelOpen) {
            if (e.key === 'ArrowRight' || e.key === 'a' || e.key === 'A') {
                e.preventDefault();
                if (variants[currentIndex]) tinderVerdict('approved');
            } else if (e.key === 'ArrowLeft' || e.key === 'r' || e.key === 'R') {
                e.preventDefault();
                if (variants[currentIndex]) tinderVerdict('rejected');
            }
        } else {
            if (e.key === 'Enter') {
                e.preventDefault();
                submitChipFeedback();
            } else if (e.key === 'Escape') {
                advanceTinder();
            }
        }
    });
}

// ============================================================
//  GALLERY MODE
// ============================================================
function renderGallery() {
    const grid = document.getElementById('galleryGrid');
    if (!variants.length) {
        grid.innerHTML = `<div style="grid-column:1/-1;text-align:center;padding:60px;color:var(--text-dim);">No variants pending review.</div>`;
        return;
    }

    grid.innerHTML = variants.map(v => `
        <div class="gallery-card ${selectedIds.has(v.id) ? 'selected' : ''}" onclick="toggleSelect('${v.id}')">
            ${buildAssetHtml(v, false)}
            <div class="card-body">
                <div class="card-headline">${esc(v.headline)}</div>
                <div class="card-text">${esc(v.primary_text)}</div>
                <div class="card-tags">
                    ${[v.taxonomy?.message_type, v.taxonomy?.hook_type, v.taxonomy?.tone].filter(Boolean).map(t => `<span class="card-tag">${esc(t)}</span>`).join('')}
                </div>
                <div class="card-cta">${esc(v.cta_button || 'Learn More')}</div>
            </div>
        </div>
    `).join('');

    scaleIframes();
}

function toggleSelect(id) {
    if (selectedIds.has(id)) selectedIds.delete(id);
    else selectedIds.add(id);
    renderGallery();
}

function selectAll() {
    variants.forEach(v => selectedIds.add(v.id));
    renderGallery();
}

function clearSelection() {
    selectedIds.clear();
    renderGallery();
}

function showGalleryModal(verdict) {
    if (!selectedIds.size) { showToast('Select at least one ad', 'info'); return; }
    galleryVerdictType = verdict;

    document.getElementById('modalTitle').textContent = verdict === 'approve' ? 'Approve Ads' : 'Reject Ads';
    document.getElementById('modalSub').textContent = verdict === 'approve'
        ? 'Optional: tap what you liked so the system learns.'
        : 'Optional: tap what\'s wrong to train the generator.';

    const chipList = verdict === 'reject' ? chips.rejection : chips.approval;
    const chipClass = verdict === 'reject' ? 'selected-reject' : 'selected-approve';

    document.getElementById('modalChipsWrap').innerHTML = `
        <div class="chips-section-label">${verdict === 'reject' ? 'What\'s wrong?' : 'What\'s good?'}</div>
        <div class="chips-wrap">${(chipList || []).map(c =>
            `<div class="chip" data-id="${c.id}" onclick="toggleModalChip(this,'${chipClass}')">${esc(c.label)}</div>`
        ).join('')}</div>
    `;

    const btn = document.getElementById('modalSubmitBtn');
    btn.textContent = verdict === 'approve' ? `Approve ${selectedIds.size}` : `Reject ${selectedIds.size}`;
    btn.className = `btn-modal-submit ${verdict === 'approve' ? 'approve' : 'reject'}`;

    document.getElementById('modalNote').value = '';
    document.getElementById('galleryModal').classList.add('active');
}

function toggleModalChip(el, cls) {
    el.classList.toggle(cls);
}

function closeGalleryModal() {
    document.getElementById('galleryModal').classList.remove('active');
    galleryVerdictType = null;
}

async function submitGalleryVerdict() {
    if (!galleryVerdictType || !selectedIds.size) return;

    const verdict = galleryVerdictType === 'approve' ? 'approved' : 'rejected';
    const chips = Array.from(document.querySelectorAll('#modalChipsWrap .chip.selected-reject, #modalChipsWrap .chip.selected-approve')).map(el => el.dataset.id);
    const note = document.getElementById('modalNote').value.trim() || null;
    const ids = [...selectedIds];

    closeGalleryModal();

    let ok = 0;
    for (const id of ids) {
        try {
            await submitVerdict(id, verdict, 0, chips, note);
            ok++;
        } catch (e) {}
    }

    selectedIds.clear();
    showToast(`${ok} ads ${verdict}`, verdict === 'approved' ? 'success' : 'error');
    await loadQueue();
    loadReviewCounts();
}

// ============================================================
//  SCOREBOARD
// ============================================================
let scoreSort = { col: 'cpfn', asc: true };

async function loadScoreboard() {
    const el = document.getElementById('scoreboardContent');
    el.innerHTML = `<div class="loading">Loading scoreboard...</div>`;
    try {
        const res = await fetch(`${API}/api/scoreboard`);
        const data = await res.json();
        renderScoreboard(data);
    } catch (e) {
        el.innerHTML = `<div class="scoreboard-empty"><h3>No data</h3><p>No live ads yet.</p></div>`;
    }
}

function renderScoreboard(data) {
    const el = document.getElementById('scoreboardContent');
    if (!data.entries || !data.entries.length) {
        el.innerHTML = `<h2>Performance Scoreboard</h2><div class="scoreboard-empty"><h3>No live ads yet</h3><p>Ads show up here once deployed to Meta or Google.</p></div>`;
        return;
    }

    const portfolioStr = data.portfolio_avg_cpfn ? `Portfolio avg CpFN: $${data.portfolio_avg_cpfn}` : '';
    const avg = data.portfolio_avg_cpfn;

    const sorted = [...data.entries].sort((a, b) => {
        const av = a[scoreSort.col] ?? Infinity;
        const bv = b[scoreSort.col] ?? Infinity;
        return scoreSort.asc ? av - bv : bv - av;
    });

    const thClass = (col) => col === scoreSort.col ? 'style="color:var(--text);"' : '';
    const arrow = scoreSort.asc ? ' ↑' : ' ↓';

    const rows = sorted.map((e, i) => {
        const cpfnClass = avg
            ? (e.cpfn < avg * 0.9 ? 'cpfn-winner' : e.cpfn > avg * 1.1 ? 'cpfn-loser' : 'cpfn-mid')
            : '';
        const trendClass = { improving: 'trend-up', declining: 'trend-down', stable: 'trend-stable' }[e.trend] || '';
        const decision = e.latest_decision ? `<span class="verdict-badge ${e.latest_decision}">${e.latest_decision}</span>` : '—';
        return `<tr>
            <td class="rank-cell">#${i + 1}</td>
            <td class="headline-cell">${esc(e.headline)}</td>
            <td class="cpfn-cell ${cpfnClass}">${e.cpfn ? '$' + e.cpfn : '—'}</td>
            <td>$${e.total_spend.toLocaleString()}</td>
            <td>${e.total_notes}</td>
            <td class="${trendClass}">${e.trend}</td>
            <td>${e.days_live}d</td>
            <td>${decision}</td>
        </tr>`;
    }).join('');

    el.innerHTML = `
        <h2>Performance Scoreboard</h2>
        <p class="scoreboard-meta">${data.total_active} live ads · ${portfolioStr}</p>
        <table class="scoreboard-table">
            <thead>
                <tr>
                    <th onclick="sortScore('rank')">#</th>
                    <th onclick="sortScore('headline')">Ad</th>
                    <th onclick="sortScore('cpfn')" ${thClass('cpfn')}>CpFN${scoreSort.col === 'cpfn' ? arrow : ''}</th>
                    <th onclick="sortScore('total_spend')" ${thClass('total_spend')}>Spend${scoreSort.col === 'total_spend' ? arrow : ''}</th>
                    <th onclick="sortScore('total_notes')" ${thClass('total_notes')}>Notes${scoreSort.col === 'total_notes' ? arrow : ''}</th>
                    <th>Trend</th>
                    <th onclick="sortScore('days_live')">Days</th>
                    <th>Decision</th>
                </tr>
            </thead>
            <tbody>${rows}</tbody>
        </table>
    `;
}

function sortScore(col) {
    if (scoreSort.col === col) scoreSort.asc = !scoreSort.asc;
    else { scoreSort.col = col; scoreSort.asc = true; }
    loadScoreboard();
}

// ============================================================
//  LEARNINGS
// ============================================================
async function loadLearnings() {
    const el = document.getElementById('learningsContent');
    el.innerHTML = `<div class="loading" style="grid-column:1/-1;">Loading learnings...</div>`;

    const reviewer = getReviewer();
    try {
        const res = await fetch(`${API}/api/learnings?reviewer=${reviewer}`);
        const data = await res.json();
        renderLearnings(data);
    } catch (e) {
        el.innerHTML = `<div class="loading" style="grid-column:1/-1;color:var(--text-dim);">Could not load learnings.</div>`;
    }
}

function renderLearnings(data) {
    const el = document.getElementById('learningsContent');
    el.innerHTML = '';

    // Playbook rules
    const rules = data.playbook_rules || [];
    const rulesHtml = rules.length
        ? rules.map(r => `
            <div class="playbook-rule">
                <div class="rule-text">${esc(r.rule || JSON.stringify(r))}</div>
                <div class="rule-meta">
                    ${r.confidence ? `<span class="confidence-badge ${r.confidence}">${r.confidence}</span>` : ''}
                    ${r.direction ? `<span class="direction-badge ${r.direction}">${r.direction === 'use_more' ? '↑ Use more' : '↓ Avoid'}</span>` : ''}
                    ${r.feature ? `<span style="font-size:11px;color:var(--text-dim);">${esc(r.feature)}</span>` : ''}
                </div>
            </div>
        `).join('')
        : `<div class="learnings-empty">No regression results yet. Run the regression pipeline to generate insights.</div>`;

    el.insertAdjacentHTML('beforeend', `
        <div class="learnings-section full-width">
            <h3>What the System Learned</h3>
            ${rulesHtml}
        </div>
    `);

    // Chip aggregates
    const chips_data = data.chip_aggregates || {};
    const rejChips = chips_data.rejection_chips || {};
    const appChips = chips_data.approval_chips || {};
    const maxRej = Math.max(...Object.values(rejChips), 1);
    const maxApp = Math.max(...Object.values(appChips), 1);

    const rejRows = Object.entries(rejChips).slice(0, 8).map(([id, count]) => `
        <div class="chip-impact-row">
            <div class="chip-impact-label">${esc(id.replace(/_/g, ' '))}</div>
            <div class="chip-bar"><div class="chip-bar-fill" style="width:${(count/maxRej*100).toFixed(0)}%"></div></div>
            <div class="chip-impact-count">${count}</div>
        </div>
    `).join('') || `<div class="learnings-empty">No rejection chips recorded yet.</div>`;

    const appRows = Object.entries(appChips).slice(0, 8).map(([id, count]) => `
        <div class="chip-impact-row">
            <div class="chip-impact-label">${esc(id.replace(/_/g, ' '))}</div>
            <div class="chip-bar"><div class="chip-bar-fill approval" style="width:${(count/maxApp*100).toFixed(0)}%"></div></div>
            <div class="chip-impact-count">${count}</div>
        </div>
    `).join('') || `<div class="learnings-empty">No approval chips recorded yet.</div>`;

    el.insertAdjacentHTML('beforeend', `
        <div class="learnings-section">
            <h3>Rejection Reasons (top)</h3>
            ${rejRows}
        </div>
        <div class="learnings-section">
            <h3>Approval Highlights</h3>
            ${appRows}
        </div>
    `);

    // Memory summary
    const mem = data.memory_summary || {};
    const memHtml = Object.keys(mem).length ? `
        <div class="memory-stat"><span class="label">Patterns learned</span><span class="value">${mem.winning_patterns ?? 0}</span></div>
        <div class="memory-stat"><span class="label">Variants analyzed</span><span class="value">${mem.total_analyzed ?? 0}</span></div>
        ${mem.last_regression ? `<div class="memory-stat"><span class="label">Last regression</span><span class="value">${mem.last_regression}</span></div>` : ''}
        ${(mem.fatigue_alerts || []).map(a => `
            <div class="memory-stat">
                <span class="label">⚠ Fatigue: ${esc(a.feature)}</span>
                <span class="value" style="color:var(--amber);">${a.delta_pct > 0 ? '+' : ''}${a.delta_pct?.toFixed(0)}%</span>
            </div>
        `).join('')}
    ` : `<div class="learnings-empty">Memory not yet built.</div>`;

    el.insertAdjacentHTML('beforeend', `
        <div class="learnings-section">
            <h3>Creative Memory</h3>
            ${memHtml}
        </div>
    `);

    // Reviewer impact
    const ri = data.reviewer_impact;
    const reviewer = getReviewer();
    const riHtml = ri && ri.total_reviews > 0 ? `
        <div class="reviewer-profile">
            <div class="profile-stat"><span class="pl">Total reviews</span><span class="pv">${ri.total_reviews}</span></div>
            <div class="profile-stat"><span class="pl">Approval rate</span><span class="pv">${(ri.approval_rate * 100).toFixed(0)}%</span></div>
            <div class="profile-stat"><span class="pl">Chip coverage</span><span class="pv">${(ri.chip_coverage_rate * 100).toFixed(0)}% of reviews</span></div>
            <div class="profile-stat"><span class="pl">Avg review time</span><span class="pv">${ri.avg_review_duration_ms ? (ri.avg_review_duration_ms / 1000).toFixed(1) + 's' : '—'}</span></div>
            ${ri.top_rejection_chips?.length ? `<div style="margin-top:8px;font-size:11px;color:var(--text-dim);">Top rejection reasons: ${ri.top_rejection_chips.map(([id]) => id.replace(/_/g, ' ')).join(', ')}</div>` : ''}
        </div>
    ` : `<div class="learnings-empty">No reviews recorded yet for ${esc(reviewer)}.</div>`;

    el.insertAdjacentHTML('beforeend', `
        <div class="learnings-section">
            <h3>Your Impact (${esc(reviewer)})</h3>
            ${riHtml}
        </div>
    `);
}

// ============================================================
//  UTILITIES
// ============================================================
function getReviewer() {
    return document.getElementById('reviewerSelect').value;
}

function showToast(msg, type = 'info') {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = `toast toast-${type}`;
    t.style.display = 'block';
    t.style.opacity = '1';
    setTimeout(() => { t.style.opacity = '0'; setTimeout(() => { t.style.display = 'none'; }, 300); }, 2500);
}

function esc(str) {
    if (!str && str !== 0) return '';
    const d = document.createElement('div');
    d.textContent = String(str);
    return d.innerHTML;
}
