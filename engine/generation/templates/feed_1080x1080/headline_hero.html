<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1080, height=1080">
    <style>
        @font-face {
            font-family: 'Archivo';
            src: url('{{font_path_archivo}}') format('truetype');
            font-weight: 100 900;
        }
        @font-face {
            font-family: 'Inter';
            src: url('{{font_path_inter}}') format('truetype');
            font-weight: 100 900;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            width: 1080px;
            height: 1080px;
            font-family: 'Inter', sans-serif;
            background: {{background_color}};
            overflow: hidden;
            position: relative;
        }

        .gradient-wash {
            position: absolute;
            inset: 0;
            background: linear-gradient(
                160deg,
                {{background_color}} 0%,
                {{background_color}} 60%,
                {{accent_color}}18 100%
            );
        }

        .container {
            position: relative;
            z-index: 1;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            padding: 80px 88px 72px;
        }

        .logo { height: 36px; width: auto; max-width: 200px; object-fit: contain; }

        .content {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 32px;
        }

        .headline {
            font-family: 'Archivo', sans-serif;
            font-size: 76px;
            font-weight: 700;
            line-height: 1.08;
            color: {{headline_color}};
            letter-spacing: -1.5px;
            max-width: 90%;
        }

        .body-text {
            font-size: 28px;
            font-weight: 400;
            line-height: 1.4;
            color: {{body_color}};
            opacity: 0.7;
            max-width: 75%;
        }

        .cta-button {
            display: inline-flex;
            align-items: center;
            padding: 22px 52px;
            background: {{cta_background}};
            color: {{cta_text_color}};
            font-family: 'Inter', sans-serif;
            font-size: 24px;
            font-weight: 600;
            border-radius: 14px;
            align-self: flex-start;
            margin-top: 4px;
        }

        .accent-strip {
            position: absolute;
            bottom: 0; left: 0; right: 0;
            height: 8px;
            background: linear-gradient(90deg, {{accent_color}} 0%, {{cta_background}} 100%);
        }
    </style>
</head>
<body>
    <div class="gradient-wash"></div>
    <div class="container">
        <img src="{{logo_path}}" alt="JotPsych" class="logo">
        <div class="content">
            <h1 class="headline">{{headline}}</h1>
            <p class="body-text">{{body}}</p>
            <span class="cta-button">{{cta}}</span>
        </div>
    </div>
    <div class="accent-strip"></div>
</body>
</html>
