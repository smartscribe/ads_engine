<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1080, height=1080">
    <style>
        @font-face {
            font-family: 'Archivo';
            src: url('{{font_path_archivo}}') format('truetype');
            font-weight: 100 900;
        }
        @font-face {
            font-family: 'Inter';
            src: url('{{font_path_inter}}') format('truetype');
            font-weight: 100 900;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            width: 1080px;
            height: 1080px;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            position: relative;
        }

        .bg-image {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Dark gradient overlay for text readability */
        .overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(
                180deg,
                rgba(0,0,0,0.15) 0%,
                rgba(0,0,0,0.05) 30%,
                rgba(0,0,0,0.35) 60%,
                rgba(0,0,0,0.75) 100%
            );
        }

        .container {
            position: relative;
            z-index: 2;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            padding: 56px 72px 64px;
        }

        .logo { height: 32px; width: auto; max-width: 180px; object-fit: contain; }

        .content {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            gap: 20px;
        }

        .headline {
            font-family: 'Archivo', sans-serif;
            font-size: 64px;
            font-weight: 700;
            line-height: 1.08;
            color: #FFFFFF;
            letter-spacing: -1px;
            text-shadow: 0 2px 12px rgba(0,0,0,0.4);
            max-width: 90%;
        }

        .body-text {
            font-size: 26px;
            font-weight: 400;
            line-height: 1.4;
            color: rgba(255,255,255,0.85);
            text-shadow: 0 1px 6px rgba(0,0,0,0.4);
            max-width: 80%;
        }

        .cta-button {
            display: inline-flex;
            align-items: center;
            padding: 20px 48px;
            background: {{cta_background}};
            color: {{cta_text_color}};
            font-family: 'Inter', sans-serif;
            font-size: 22px;
            font-weight: 600;
            border-radius: 12px;
            align-self: flex-start;
            margin-top: 4px;
        }
    </style>
</head>
<body>
    <img class="bg-image" src="{{background_image}}" alt="">
    <div class="overlay"></div>
    <div class="container">
        <img src="{{logo_path}}" alt="JotPsych" class="logo">
        <div class="content">
            <h1 class="headline">{{headline}}</h1>
            <p class="body-text">{{body}}</p>
            <span class="cta-button">{{cta}}</span>
        </div>
    </div>
</body>
</html>
