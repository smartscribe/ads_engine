<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1080, height=1080">
    <style>
        @font-face {
            font-family: 'Archivo';
            src: url('{{font_path_archivo}}') format('truetype');
            font-weight: 100 900;
        }
        @font-face {
            font-family: 'Inter';
            src: url('{{font_path_inter}}') format('truetype');
            font-weight: 100 900;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            width: 1080px;
            height: 1080px;
            font-family: 'Inter', sans-serif;
            background: {{background_color}};
            overflow: hidden;
            display: flex;
            flex-direction: column;
            padding: 72px 80px 64px;
            position: relative;
        }

        .logo { height: 48px; width: auto; }

        .content {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 20px;
        }

        .quote-mark {
            font-family: 'Archivo', sans-serif;
            font-size: 160px;
            font-weight: 800;
            line-height: 0.6;
            color: {{accent_color}};
            opacity: 0.3;
            user-select: none;
        }

        .quote-text {
            font-family: 'Archivo', sans-serif;
            font-size: 52px;
            font-weight: 500;
            font-style: italic;
            line-height: 1.3;
            color: {{headline_color}};
            max-width: 92%;
        }

        .attribution {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-top: 16px;
        }

        .attr-line {
            width: 48px;
            height: 3px;
            background: {{accent_color}};
            border-radius: 2px;
        }

        .attr-text {
            font-size: 26px;
            font-weight: 500;
            color: {{body_color}};
            opacity: 0.75;
        }

        .footer-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .cta-button {
            display: inline-flex;
            align-items: center;
            padding: 20px 44px;
            background: {{cta_background}};
            color: {{cta_text_color}};
            font-family: 'Inter', sans-serif;
            font-size: 24px;
            font-weight: 600;
            border-radius: 12px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.12);
        }

        .footer-logo { height: 36px; width: auto; opacity: 0.5; }

        .accent-strip {
            position: absolute;
            bottom: 0; left: 0; right: 0;
            height: 10px;
            background: linear-gradient(90deg, #1C1E85 0%, #FD96C9 50%, #813FE8 100%);
        }
    </style>
</head>
<body>
    <img src="{{logo_path}}" alt="JotPsych" class="logo">

    <div class="content">
        <span class="quote-mark">&ldquo;</span>
        <p class="quote-text">{{headline}}</p>
        <div class="attribution">
            <div class="attr-line"></div>
            <span class="attr-text">{{attribution}}</span>
        </div>
    </div>

    <div class="footer-row">
        <span class="cta-button">{{cta}}</span>
    </div>

    <div class="accent-strip"></div>
</body>
</html>
