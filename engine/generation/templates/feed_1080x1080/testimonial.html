<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1080, height=1080">
    <style>
        @font-face {
            font-family: 'Archivo';
            src: url('{{font_path_archivo}}') format('truetype');
            font-weight: 100 900;
        }
        @font-face {
            font-family: 'Inter';
            src: url('{{font_path_inter}}') format('truetype');
            font-weight: 100 900;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            width: 1080px;
            height: 1080px;
            font-family: 'Inter', sans-serif;
            background: {{background_color}};
            overflow: hidden;
            display: flex;
            flex-direction: column;
            padding: 80px 88px 72px;
            position: relative;
        }

        .logo { height: 36px; width: auto; max-width: 200px; object-fit: contain; }

        .content {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 24px;
        }

        .quote-mark {
            font-family: 'Archivo', sans-serif;
            font-size: 140px;
            font-weight: 800;
            line-height: 0.5;
            color: {{accent_color}};
            opacity: 0.25;
            user-select: none;
        }

        .quote-text {
            font-family: 'Archivo', sans-serif;
            font-size: 48px;
            font-weight: 500;
            font-style: italic;
            line-height: 1.3;
            color: {{headline_color}};
            max-width: 90%;
        }

        .attribution {
            display: flex;
            align-items: center;
            gap: 14px;
            margin-top: 12px;
        }

        .attr-line {
            width: 40px;
            height: 3px;
            background: {{accent_color}};
            border-radius: 2px;
        }

        .attr-text {
            font-size: 22px;
            font-weight: 500;
            color: {{body_color}};
            opacity: 0.6;
        }

        .footer-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .cta-button {
            display: inline-flex;
            align-items: center;
            padding: 20px 44px;
            background: {{cta_background}};
            color: {{cta_text_color}};
            font-family: 'Inter', sans-serif;
            font-size: 22px;
            font-weight: 600;
            border-radius: 12px;
        }

        .accent-strip {
            position: absolute;
            bottom: 0; left: 0; right: 0;
            height: 8px;
            background: linear-gradient(90deg, {{accent_color}} 0%, {{cta_background}} 100%);
        }
    </style>
</head>
<body>
    <img src="{{logo_path}}" alt="JotPsych" class="logo">

    <div class="content">
        <span class="quote-mark">&ldquo;</span>
        <p class="quote-text">{{headline}}</p>
        <div class="attribution">
            <div class="attr-line"></div>
            <span class="attr-text">{{attribution}}</span>
        </div>
    </div>

    <div class="footer-row">
        <span class="cta-button">{{cta}}</span>
    </div>

    <div class="accent-strip"></div>
</body>
</html>
