<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1080, height=1080">
    <style>
        @font-face {
            font-family: 'Archivo';
            src: url('{{font_path_archivo}}') format('truetype');
            font-weight: 100 900;
        }
        @font-face {
            font-family: 'Inter';
            src: url('{{font_path_inter}}') format('truetype');
            font-weight: 100 900;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            width: 1080px;
            height: 1080px;
            font-family: 'Inter', sans-serif;
            background: {{background_color}};
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            position: relative;
        }

        .logo-top {
            position: absolute;
            top: 64px;
            left: 80px;
        }

        .logo-top img { height: 36px; width: auto; }

        .stat-block {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            margin-bottom: 36px;
        }

        .stat-number {
            font-family: 'Archivo', sans-serif;
            font-size: 160px;
            font-weight: 800;
            line-height: 1;
            color: {{headline_color}};
            letter-spacing: -6px;
        }

        .stat-unit {
            font-family: 'Archivo', sans-serif;
            font-size: 36px;
            font-weight: 500;
            color: {{headline_color}};
            opacity: 0.6;
            text-transform: uppercase;
            letter-spacing: 4px;
        }

        .stat-divider {
            width: 64px;
            height: 4px;
            background: {{accent_color}};
            border-radius: 2px;
            margin: 12px 0 28px;
        }

        .headline {
            font-family: 'Archivo', sans-serif;
            font-size: 46px;
            font-weight: 600;
            line-height: 1.15;
            color: {{headline_color}};
            max-width: 80%;
            margin-bottom: 32px;
        }

        .cta-button {
            display: inline-flex;
            align-items: center;
            padding: 22px 52px;
            background: {{cta_background}};
            color: {{cta_text_color}};
            font-family: 'Inter', sans-serif;
            font-size: 24px;
            font-weight: 600;
            border-radius: 14px;
        }

        .accent-strip {
            position: absolute;
            bottom: 0; left: 0; right: 0;
            height: 8px;
            background: linear-gradient(90deg, {{accent_color}} 0%, {{cta_background}} 100%);
        }
    </style>
</head>
<body>
    <div class="logo-top">
        <img src="{{logo_path}}" alt="JotPsych">
    </div>

    <div class="stat-block">
        <span class="stat-number">{{stat_number}}</span>
        <span class="stat-unit">{{stat_unit}}</span>
    </div>
    <div class="stat-divider"></div>

    <h1 class="headline">{{headline}}</h1>
    <span class="cta-button">{{cta}}</span>

    <div class="accent-strip"></div>
</body>
</html>
