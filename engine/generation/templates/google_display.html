<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width={{width}}, height={{height}}">
    <title>JotPsych Display Ad</title>
    <style>
        @font-face {
            font-family: 'Archivo';
            src: url('{{font_path_archivo}}') format('truetype');
            font-weight: 100 900;
            font-style: normal;
        }
        @font-face {
            font-family: 'Inter';
            src: url('{{font_path_inter}}') format('truetype');
            font-weight: 100 900;
            font-style: normal;
        }
        
        :root {
            --color-midnight: #1C1E85;
            --color-sunset: #FD96C9;
            --color-warm-light: #FFF2F5;
            --color-deep-night: #1E125E;
            --color-daylight: #FFF3C4;
            --color-afterglow: #813FE8;
            --color-white: #FFFFFF;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            width: {{width}}px;
            height: {{height}}px;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: {{background_color}};
            overflow: hidden;
            position: relative;
        }
        
        /* 300x250 Medium Rectangle Layout */
        .layout-300x250 {
            display: flex;
            flex-direction: column;
            padding: 20px;
            height: 100%;
        }
        
        .layout-300x250 .logo {
            height: 28px;
            width: auto;
            margin-bottom: 16px;
        }
        
        .layout-300x250 .content {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        
        .layout-300x250 .headline {
            font-family: 'Archivo', sans-serif;
            font-size: 24px;
            font-weight: 600;
            line-height: 1.2;
            color: {{headline_color}};
            margin-bottom: 12px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        
        .layout-300x250 .body-text {
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            font-weight: 400;
            line-height: 1.4;
            color: {{body_color}};
            margin-bottom: 16px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            opacity: 0.85;
        }
        
        .layout-300x250 .cta-button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 10px 20px;
            background-color: {{cta_background}};
            color: {{cta_text_color}};
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            font-weight: 600;
            border-radius: 6px;
            align-self: flex-start;
        }
        
        /* 728x90 Leaderboard Layout */
        .layout-728x90 {
            display: flex;
            flex-direction: row;
            align-items: center;
            padding: 12px 24px;
            height: 100%;
            gap: 24px;
        }
        
        .layout-728x90 .logo {
            height: 32px;
            width: auto;
            flex-shrink: 0;
        }
        
        .layout-728x90 .content {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            min-width: 0;
        }
        
        .layout-728x90 .headline {
            font-family: 'Archivo', sans-serif;
            font-size: 22px;
            font-weight: 600;
            line-height: 1.2;
            color: {{headline_color}};
            margin-bottom: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .layout-728x90 .body-text {
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            font-weight: 400;
            line-height: 1.3;
            color: {{body_color}};
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            opacity: 0.85;
        }
        
        .layout-728x90 .cta-button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 12px 24px;
            background-color: {{cta_background}};
            color: {{cta_text_color}};
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            font-weight: 600;
            border-radius: 6px;
            flex-shrink: 0;
            white-space: nowrap;
        }
        
        /* 160x600 Skyscraper Layout */
        .layout-160x600 {
            display: flex;
            flex-direction: column;
            padding: 20px 16px;
            height: 100%;
            text-align: center;
        }
        
        .layout-160x600 .logo {
            height: 24px;
            width: auto;
            margin: 0 auto 20px;
        }
        
        .layout-160x600 .content {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        
        .layout-160x600 .headline {
            font-family: 'Archivo', sans-serif;
            font-size: 20px;
            font-weight: 600;
            line-height: 1.2;
            color: {{headline_color}};
            margin-bottom: 16px;
            display: -webkit-box;
            -webkit-line-clamp: 4;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        
        .layout-160x600 .body-text {
            font-family: 'Inter', sans-serif;
            font-size: 13px;
            font-weight: 400;
            line-height: 1.4;
            color: {{body_color}};
            margin-bottom: 20px;
            display: -webkit-box;
            -webkit-line-clamp: 4;
            -webkit-box-orient: vertical;
            overflow: hidden;
            opacity: 0.85;
        }
        
        .layout-160x600 .cta-button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 10px 16px;
            background-color: {{cta_background}};
            color: {{cta_text_color}};
            font-family: 'Inter', sans-serif;
            font-size: 13px;
            font-weight: 600;
            border-radius: 6px;
            margin: 0 auto;
        }
        
        .accent-bar {
            position: absolute;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, var(--color-midnight) 0%, var(--color-sunset) 50%, var(--color-afterglow) 100%);
        }
        
        .accent-bar.top { top: 0; }
        .accent-bar.bottom { bottom: 0; }
    </style>
</head>
<body>
    <div class="accent-bar top"></div>
    
    <div class="layout-{{layout}}">
        <img src="{{logo_path}}" alt="JotPsych" class="logo">
        
        <div class="content">
            <h1 class="headline">{{headline}}</h1>
            <p class="body-text">{{body}}</p>
        </div>
        
        <span class="cta-button">{{cta}}</span>
    </div>
    
    <div class="accent-bar bottom"></div>
</body>
</html>
