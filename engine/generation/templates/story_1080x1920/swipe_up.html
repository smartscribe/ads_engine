<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1080, height=1920">
    <style>
        @font-face {
            font-family: 'Archivo';
            src: url('{{font_path_archivo}}') format('truetype');
            font-weight: 100 900;
        }
        @font-face {
            font-family: 'Inter';
            src: url('{{font_path_inter}}') format('truetype');
            font-weight: 100 900;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            width: 1080px;
            height: 1920px;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            position: relative;
            background: {{background_color}};
        }

        .container {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            padding: 100px 72px 200px;
        }

        .top-section {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 80px;
            opacity: 0;
            animation: fadeIn 0.5s ease-out 0.3s forwards;
        }

        .logo { height: 52px; width: auto; }

        .pill-badge {
            display: inline-flex;
            align-items: center;
            padding: 10px 24px;
            background: {{accent_color}}20;
            border: 2px solid {{accent_color}}40;
            border-radius: 100px;
            font-size: 22px;
            font-weight: 600;
            color: {{headline_color}};
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .content {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 32px;
        }

        .headline {
            font-family: 'Archivo', sans-serif;
            font-size: 80px;
            font-weight: 700;
            line-height: 1.08;
            color: {{headline_color}};
            letter-spacing: -1.5px;
            opacity: 0;
            animation: fadeSlideUp 0.8s ease-out 0.6s forwards;
        }

        .body-text {
            font-size: 38px;
            font-weight: 400;
            line-height: 1.45;
            color: {{body_color}};
            opacity: 0;
            max-width: 90%;
            animation: fadeSlideUp 0.7s ease-out 1.2s forwards;
        }

        .cta-section {
            position: absolute;
            bottom: 100px;
            left: 0;
            right: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            opacity: 0;
            animation: fadeSlideUp 0.6s ease-out 1.7s forwards;
        }

        .cta-button {
            display: inline-flex;
            align-items: center;
            padding: 28px 72px;
            background: {{cta_background}};
            color: {{cta_text_color}};
            font-family: 'Inter', sans-serif;
            font-size: 30px;
            font-weight: 600;
            border-radius: 16px;
            box-shadow: 0 6px 28px rgba(0,0,0,0.18);
        }

        .swipe-hint {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            animation: bounce 1.5s ease-in-out 2.5s infinite;
        }

        .swipe-arrow {
            width: 28px;
            height: 28px;
            border-left: 3px solid {{body_color}};
            border-bottom: 3px solid {{body_color}};
            transform: rotate(-45deg);
            opacity: 0.5;
        }

        .swipe-label {
            font-size: 20px;
            font-weight: 500;
            color: {{body_color}};
            opacity: 0.5;
            text-transform: uppercase;
            letter-spacing: 3px;
        }

        .top-bar {
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 10px;
            background: linear-gradient(90deg, #1C1E85 0%, #FD96C9 50%, #813FE8 100%);
        }

        @keyframes fadeSlideUp {
            from { opacity: 0; transform: translateY(30px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to   { opacity: 1; }
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50%      { transform: translateY(-12px); }
        }
    </style>
</head>
<body>
    <div class="top-bar"></div>

    <div class="container">
        <div class="top-section">
            <img src="{{logo_path}}" alt="JotPsych" class="logo">
            <span class="pill-badge">{{badge_text}}</span>
        </div>

        <div class="content">
            <h1 class="headline">{{headline}}</h1>
            <p class="body-text">{{body}}</p>
        </div>
    </div>

    <div class="cta-section">
        <span class="cta-button">{{cta}}</span>
        <div class="swipe-hint">
            <div class="swipe-arrow"></div>
            <span class="swipe-label">Swipe Up</span>
        </div>
    </div>
</body>
</html>
