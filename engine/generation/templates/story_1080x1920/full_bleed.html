<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1080, height=1920">
    <style>
        @font-face {
            font-family: 'Archivo';
            src: url('{{font_path_archivo}}') format('truetype');
            font-weight: 100 900;
        }
        @font-face {
            font-family: 'Inter';
            src: url('{{font_path_inter}}') format('truetype');
            font-weight: 100 900;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            width: 1080px;
            height: 1920px;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            position: relative;
            background: {{background_color}};
        }

        .bg-gradient {
            position: absolute;
            inset: 0;
            background: linear-gradient(
                170deg,
                {{background_color}} 0%,
                {{background_color}} 40%,
                {{accent_color}}18 70%,
                {{accent_color}}30 100%
            );
        }

        .container {
            position: relative;
            z-index: 1;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            padding: 100px 72px 160px;
        }

        .logo {
            height: 56px;
            width: auto;
            opacity: 0;
            animation: fadeSlideDown 0.6s ease-out 0.2s forwards;
        }

        .content {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            gap: 36px;
        }

        .headline {
            font-family: 'Archivo', sans-serif;
            font-size: 92px;
            font-weight: 700;
            line-height: 1.05;
            color: {{headline_color}};
            letter-spacing: -2px;
            opacity: 0;
            animation: fadeSlideUp 0.8s ease-out 0.5s forwards;
        }

        .divider {
            width: 64px;
            height: 4px;
            background: {{accent_color}};
            border-radius: 2px;
            opacity: 0;
            animation: scaleIn 0.5s ease-out 1.1s forwards;
        }

        .body-text {
            font-size: 40px;
            font-weight: 400;
            line-height: 1.45;
            color: {{body_color}};
            opacity: 0;
            max-width: 88%;
            animation: fadeSlideUp 0.7s ease-out 1.4s forwards;
        }

        .cta-button {
            display: inline-flex;
            align-items: center;
            padding: 28px 64px;
            background: {{cta_background}};
            color: {{cta_text_color}};
            font-family: 'Inter', sans-serif;
            font-size: 30px;
            font-weight: 600;
            border-radius: 16px;
            box-shadow: 0 6px 28px rgba(0,0,0,0.15);
            opacity: 0;
            animation: fadeSlideUp 0.6s ease-out 1.9s forwards;
        }

        .bottom-accent {
            position: absolute;
            bottom: 0; left: 0; right: 0;
            height: 12px;
            background: linear-gradient(90deg, #FD96C9 0%, #813FE8 50%, #1C1E85 100%);
        }

        .top-accent {
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 12px;
            background: linear-gradient(90deg, #1C1E85 0%, #FD96C9 50%, #813FE8 100%);
        }

        @keyframes fadeSlideUp {
            from { opacity: 0; transform: translateY(30px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeSlideDown {
            from { opacity: 0; transform: translateY(-20px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        @keyframes scaleIn {
            from { opacity: 0; transform: scaleX(0); }
            to   { opacity: 1; transform: scaleX(1); }
        }
    </style>
</head>
<body>
    <div class="bg-gradient"></div>
    <div class="top-accent"></div>

    <div class="container">
        <img src="{{logo_path}}" alt="JotPsych" class="logo">

        <div class="content">
            <h1 class="headline">{{headline}}</h1>
            <div class="divider"></div>
            <p class="body-text">{{body}}</p>
            <span class="cta-button">{{cta}}</span>
        </div>
    </div>

    <div class="bottom-accent"></div>
</body>
</html>
