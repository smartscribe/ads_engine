<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1080, height=1080">
    <style>
        @font-face {
            font-family: 'Archivo';
            src: url('{{font_path_archivo}}') format('truetype');
            font-weight: 100 900;
        }
        @font-face {
            font-family: 'Inter';
            src: url('{{font_path_inter}}') format('truetype');
            font-weight: 100 900;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            width: 1080px;
            height: 1080px;
            font-family: 'Inter', sans-serif;
            background: {{background_color}};
            overflow: hidden;
            position: relative;
        }

        /* Carousel card has a left border accent to signal swipe-ability */
        .card-accent {
            position: absolute;
            left: 0; top: 0; bottom: 0;
            width: 12px;
            background: linear-gradient(180deg, {{accent_color}} 0%, {{cta_background}} 100%);
        }

        .container {
            position: relative;
            z-index: 1;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            padding: 72px 80px 64px 108px;
        }

        .logo { height: 48px; width: auto; }

        /* PROOF ELEMENT ZONE — prominent stat callout (G4) */
        .proof-zone {
            margin: 32px 0 24px;
            display: flex;
            align-items: baseline;
            gap: 12px;
        }
        .proof-number {
            font-family: 'Archivo', sans-serif;
            font-size: 96px;
            font-weight: 800;
            line-height: 1;
            color: {{accent_color}};
            letter-spacing: -3px;
        }
        .proof-unit {
            font-family: 'Archivo', sans-serif;
            font-size: 36px;
            font-weight: 600;
            color: {{headline_color}};
            opacity: 0.7;
        }

        .content {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 20px;
        }

        .headline {
            font-family: 'Archivo', sans-serif;
            font-size: 72px;
            font-weight: 700;
            line-height: 1.08;
            color: {{headline_color}};
            letter-spacing: -1px;
            /* Prevent awkward wrapping */
            overflow: hidden;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
        }

        .body-text {
            font-size: 30px;
            font-weight: 400;
            line-height: 1.5;
            color: {{body_color}};
            opacity: 0.85;
            overflow: hidden;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
        }

        .cta-button {
            display: inline-flex;
            align-items: center;
            padding: 18px 44px;
            background: {{cta_background}};
            color: {{cta_text_color}};
            font-family: 'Inter', sans-serif;
            font-size: 24px;
            font-weight: 600;
            border-radius: 12px;
            align-self: flex-start;
            margin-top: 8px;
        }

        /* Carousel position indicator */
        .card-indicator {
            display: flex;
            gap: 8px;
            align-items: center;
            padding-top: 12px;
        }
        .dot {
            width: 8px; height: 8px;
            border-radius: 50%;
            background: {{body_color}};
            opacity: 0.3;
        }
        .dot.active {
            opacity: 1;
            background: {{accent_color}};
            width: 24px;
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <div class="card-accent"></div>
    <div class="container">
        <img src="{{logo_path}}" alt="JotPsych" class="logo">

        <!-- Proof element zone: displays a prominent stat (e.g. "2 hrs saved/day") -->
        <div class="proof-zone">
            <span class="proof-number">{{stat_number}}</span>
            <span class="proof-unit">{{stat_unit}}</span>
        </div>

        <div class="content">
            <h1 class="headline">{{headline}}</h1>
            <p class="body-text">{{body}}</p>
            <span class="cta-button">{{cta}}</span>
        </div>

        <div class="card-indicator">
            <div class="dot active"></div>
            <div class="dot"></div>
            <div class="dot"></div>
        </div>
    </div>
</body>
</html>
