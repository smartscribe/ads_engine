<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=160, height=600">
    <style>
        @font-face {
            font-family: 'Archivo';
            src: url('{{font_path_archivo}}') format('truetype');
            font-weight: 100 900;
        }
        @font-face {
            font-family: 'Inter';
            src: url('{{font_path_inter}}') format('truetype');
            font-weight: 100 900;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            width: 160px;
            height: 600px;
            font-family: 'Inter', sans-serif;
            background: {{background_color}};
            overflow: hidden;
            position: relative;
        }

        /* Gradient top wash */
        .gradient-top {
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 200px;
            background: linear-gradient(180deg, {{accent_color}}33 0%, transparent 100%);
        }

        .container {
            position: relative;
            z-index: 1;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            padding: 20px 14px 18px;
        }

        .logo { height: 22px; width: auto; }

        /* PROOF ELEMENT ZONE — full-width stat callout (G4) */
        .proof-zone {
            margin: 24px 0 16px;
            text-align: center;
        }
        .proof-number {
            font-family: 'Archivo', sans-serif;
            font-size: 52px;
            font-weight: 800;
            color: {{accent_color}};
            letter-spacing: -2px;
            line-height: 1;
            display: block;
        }
        .proof-unit {
            font-family: 'Inter', sans-serif;
            font-size: 11px;
            font-weight: 500;
            color: {{body_color}};
            opacity: 0.75;
            display: block;
            line-height: 1.3;
            margin-top: 2px;
        }

        .divider {
            height: 1px;
            background: {{headline_color}};
            opacity: 0.15;
            margin: 12px 0;
        }

        .headline {
            font-family: 'Archivo', sans-serif;
            font-size: 16px;
            font-weight: 700;
            line-height: 1.2;
            color: {{headline_color}};
            letter-spacing: -0.2px;
            overflow: hidden;
            display: -webkit-box;
            -webkit-line-clamp: 4;
            -webkit-box-orient: vertical;
        }

        .body-text {
            font-size: 10px;
            font-weight: 400;
            line-height: 1.4;
            color: {{body_color}};
            opacity: 0.8;
            margin-top: 10px;
            overflow: hidden;
            display: -webkit-box;
            -webkit-line-clamp: 4;
            -webkit-box-orient: vertical;
        }

        .spacer { flex: 1; }

        .cta-button {
            display: block;
            text-align: center;
            padding: 10px 8px;
            background: {{cta_background}};
            color: {{cta_text_color}};
            font-family: 'Inter', sans-serif;
            font-size: 11px;
            font-weight: 600;
            border-radius: 6px;
        }

        /* Left accent bar */
        .accent-left {
            position: absolute;
            left: 0; top: 0; bottom: 0;
            width: 3px;
            background: linear-gradient(180deg, #1C1E85 0%, #FD96C9 50%, #813FE8 100%);
        }
    </style>
</head>
<body>
    <div class="gradient-top"></div>
    <div class="accent-left"></div>
    <div class="container">
        <img src="{{logomark_path}}" alt="JotPsych" class="logo">

        <!-- Proof element zone: prominent stat -->
        <div class="proof-zone">
            <span class="proof-number">{{stat_number}}</span>
            <span class="proof-unit">{{stat_unit}}</span>
        </div>

        <div class="divider"></div>
        <h1 class="headline">{{headline}}</h1>
        <p class="body-text">{{body}}</p>

        <div class="spacer"></div>
        <span class="cta-button">{{cta}}</span>
    </div>
</body>
</html>
